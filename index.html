<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v3.5.21</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #fff0f5; overflow: hidden; color: #333; }
        #header { background: white; padding: 15px; text-align: center; border-bottom: 4px solid #ff69b4; z-index: 10; position: relative; }
        #header h1 { margin: 0; color: #d02090; font-size: 26px; text-transform: uppercase; }
        
        #main-container { display: flex; height: calc(100vh - 70px); }
        
        /* The Stretching Zone */
        #viewer { flex: 1; background: #fdfdfd; border-right: 2px solid #ffc0cb; position: relative; cursor: move; display: flex; align-items: center; justify-content: center; touch-action: none; }
        
        /* ViewCube (Tinkercad Style) */
        #view-cube-wrapper { position: absolute; top: 20px; left: 20px; width: 80px; height: 80px; perspective: 400px; z-index: 100; }
        #view-cube { width: 50px; height: 50px; position: relative; transform-style: preserve-3d; transform: rotateX(-20deg) rotateY(-20deg); transition: transform 0.5s; cursor: pointer; }
        .cube-face { position: absolute; width: 50px; height: 50px; background: white; border: 2px solid #ff69b4; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; color: #d02090; backface-visibility: visible; }
        .front  { transform: translateZ(25px); }
        .back   { transform: rotateY(180deg) translateZ(25px); }
        .top    { transform: rotateX(90deg) translateZ(25px); }
        .bottom { transform: rotateX(-90deg) translateZ(25px); }
        .right  { transform: rotateY(90deg) translateZ(25px); }
        .left   { transform: rotateY(-90deg) translateZ(25px); }

        #measurements { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: white; padding: 12px 25px; border-radius: 25px;
            border: 3px solid #ff69b4; color: #d02090; font-weight: bold; font-size: 16px;
            display: flex; gap: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            pointer-events: none; z-index: 50;
        }

        #controls-panel { width: 380px; background: white; padding: 25px; display: flex; flex-direction: column; border-left: 2px solid #ffc0cb; overflow-y: auto; }
        
        button { background: #ff1493; color: white; border: none; padding: 20px; border-radius: 40px; font-weight: bold; cursor: pointer; font-size: 18px; box-shadow: 0 5px 0 #b01060; transition: 0.1s; }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 #b01060; }
        
        #pattern-output { margin-top: 25px; white-space: pre-wrap; font-family: 'Courier New', monospace; font-size: 14px; color: #333; background: #fff9fb; padding: 20px; border: 1px solid #ffc0cb; border-radius: 12px; min-height: 200px; }
        .size-box { text-align: center; }
        .size-label { font-size: 11px; text-transform: uppercase; color: #ff69b4; display: block; }
        
        /* The Pink Yarn Sphere */
        #yarn-sphere { 
            background: #ff69b4; 
            border: 5px solid #d02090; 
            border-radius: 50%; 
            width: 150px; 
            height: 150px;
            box-shadow: inset -15px -15px 30px rgba(0,0,0,0.15), 0 10px 25px rgba(0,0,0,0.1);
            transition: background-color 0.3s;
        }
    </style>
</head>
<body>

<div id="header">
    <h1>✨ Build-A-Crochet v3.5.21 ✨</h1>
</div>

<div id="main-container">
    <div id="viewer">
        <div id="view-cube-wrapper">
            <div id="view-cube">
                <div class="cube-face front" onclick="snapView(0, 0, '#ff69b4')">FRONT</div>
                <div class="cube-face back" onclick="snapView(0, 180, '#ff1493')">BACK</div>
                <div class="cube-face top" onclick="snapView(-90, 0, '#ffb6c1')">TOP</div>
                <div class="cube-face bottom" onclick="snapView(90, 0, '#c71585')">BOT</div>
                <div class="cube-face right" onclick="snapView(0, -90, '#d02090')">RIGHT</div>
                <div class="cube-face left" onclick="snapView(0, 90, '#db7093')">LEFT</div>
            </div>
        </div>

        <div id="measurements">
            <div class="size-box"><span class="size-label">Width</span><span id="m-width">10.0</span>cm</div>
            <div class="size-box"><span class="size-label">Height</span><span id="m-height">10.0</span>cm</div>
            <div class="size-box"><span class="size-label">Length</span><span id="m-length">10.0</span>cm</div>
        </div>
        
        <div id="yarn-sphere" onmousedown="startDrag(event)"></div>
    </div>
    
    <div id="controls-panel">
        <button onclick="makePattern()">🧶 MAKE PATTERN</button>
        <div id="pattern-output">Stretch the ball and click make!</div>
    </div>
</div>

<script>
    let wCm = 10;
    let hCm = 10;
    let isDragging = false;
    let lastX, lastY;

    const sphere = document.getElementById('yarn-sphere');
    const cube = document.getElementById('view-cube');
    const dH = document.getElementById('m-height');
    const dW = document.getElementById('m-width');
    const dL = document.getElementById('m-length');

    // Stretching Logic (v3.5.16 Style)
    function startDrag(e) {
        isDragging = true;
        lastX = e.clientX;
        lastY = e.clientY;
        window.addEventListener('mousemove', doDrag);
        window.addEventListener('mouseup', stopDrag);
    }

    function stopDrag() {
        isDragging = false;
        window.removeEventListener('mousemove', doDrag);
        window.removeEventListener('mouseup', stopDrag);
    }

    function doDrag(e) {
        if (!isDragging) return;
        const deltaX = (e.clientX - lastX) * 0.1;
        const deltaY = (lastY - e.clientY) * 0.1;

        wCm = Math.max(4, wCm + deltaX);
        hCm = Math.max(4, hCm + deltaY);

        sphere.style.width = (wCm * 15) + 'px';
        sphere.style.height = (hCm * 15) + 'px';

        dW.innerText = wCm.toFixed(1);
        dL.innerText = wCm.toFixed(1); 
        dH.innerText = hCm.toFixed(1);

        lastX = e.clientX;
        lastY = e.clientY;
    }

    // ViewCube Logic
    function snapView(x, y, color) {
        cube.style.transform = `rotateX(${x}deg) rotateY(${y}deg)`;
        sphere.style.backgroundColor = color;
    }

        const width = parseFloat(dW.innerText);
        const height = parseFloat(dH.innerText);
        const incRounds = Math.max(3, Math.floor((width/2) * 1.5));
        const middleRows = Math.max(1, Math.floor(incRounds * (height / width)));

        let p = "<b>🧶 CROCHET PATTERN</b>\n";
        p += width.toFixed(1) + "cm x " + height.toFixed(1) + "cm\n";

        p += "R1: Magic Ring 6\n";
        for (let i = 1; i < incRounds; i++) {
            p += "R" + (i+1) + ": (sc " + i + ", inc) x 6\n";
        }
