<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McKayla's Crochet Lab v3.4.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #fff0f5; color: #333; overflow: hidden; }
        #version-tag { position: absolute; top: 10px; left: 10px; background: #ff1493; color: white; padding: 5px 15px; border-radius: 15px; font-size: 12px; z-index: 100; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #header { background: white; padding: 15px; text-align: center; border-bottom: 3px solid #ff69b4; z-index: 10; position: relative; }
        #main-container { display: flex; height: calc(100vh - 75px); }
        #viewer { flex: 1; background: radial-gradient(#ffffff, #ffe4e1); position: relative; }
        #controls-panel { width: 380px; background: white; display: flex; flex-direction: column; border-left: 2px solid #ffc0cb; }
        #controls-top { padding: 20px; border-bottom: 1px solid #eee; }
        #pattern-area { flex: 1; padding: 20px; overflow-y: auto; background: #fffafb; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #d02090; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #ff69b4; }
        input[type=color] { width: 100%; height: 35px; border: none; cursor: pointer; background: none; }
        button { background: #ff69b4; color: white; border: none; padding: 15px; width: 100%; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 16px; box-shadow: 0 4px 10px rgba(255, 105, 180, 0.3); }
        button:hover { background: #ff1493; }
        #pattern-output { white-space: pre-wrap; font-family: 'Courier New', monospace; line-height: 1.6; font-size: 14px; }
        .stuff-here { color: white; background: #ff1493; padding: 2px 8px; border-radius: 10px; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

<div id="version-tag">🧸 MCKAYLA'S LAB v3.4.1 🧸</div>

<div id="header">
    <h1>🧶 Smart Amigurumi Lab</h1>
</div>

<div id="main-container">
    <div id="viewer"></div>
    <div id="controls-panel">
        <div id="controls-top">
            <div class="input-group">
                <label>Size: <span id="r-val">10</span>cm Wide</label>
                <input type="range" id="r-slider" min="2" max="30" value="10">
            </div>
            <div class="input-group">
                <label>Yarn Color:</label>
                <input type="color" id="color-picker" value="#ff69b4">
            </div>
            <button onclick="makePattern()">✨ Generate Pattern</button>
        </div>
        <div id="pattern-area">
            <div id="pattern-output">Adjust the slider to design your ball!</div>
        </div>
    </div>
</div>

<script>
    // --- 3D Setup ---
    var scene = new THREE.Scene();
    var viewer = document.getElementById('viewer');
    var camera = new THREE.PerspectiveCamera(50, viewer.clientWidth / viewer.clientHeight, 0.1, 1000);
    var renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(viewer.clientWidth, viewer.clientHeight);
    viewer.appendChild(renderer.domElement);

    var geometry = new THREE.SphereGeometry(1, 64, 64);
    var material = new THREE.MeshPhongMaterial({ color: 0xff69b4, shininess: 50 });
    var sphere = new THREE.Mesh(geometry, material);
    scene.add(sphere);

    var light1 = new THREE.PointLight(0xffffff, 1, 100);
    light1.position.set(10, 10, 10);
    scene.add(light1);
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));

    // Initial Camera
    camera.position.z = 15;

    function animate() {
        requestAnimationFrame(animate);
        sphere.rotation.y += 0.005;
        renderer.render(scene, camera);
    }
    animate();

    // --- Controls ---
    var slider = document.getElementById('r-slider');
    var rText = document.getElementById('r-val');
    var colorPicker = document.getElementById('color-picker');

    slider.oninput = function() {
        var d = this.value;
        rText.innerText = d;
        
        // Sphere grows
        var scale = d / 2; 
        sphere.scale.set(scale, scale, scale);
        
        // CAMERA AUTO-ZOOM: Move camera back as sphere gets bigger
        // We move the camera to be a little further than the diameter
        camera.position.z = Math.max(10, d * 1.5); 
    };

    colorPicker.oninput = function() {
        sphere.material.color.set(this.value);
    };
