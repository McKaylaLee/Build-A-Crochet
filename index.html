<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Build-A-Crochet v5.1.0</title>
    <style>
        body { margin: 0; background: #fafafa; font-family: sans-serif; overflow: hidden; }
        #canvas-area { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Floating HUD */
        #hud { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            background: rgba(255, 255, 255, 0.9); border-top: 2px solid #ff69b4; z-index: 100;
            padding: 10px; box-sizing: border-box; display: flex; flex-direction: column; gap: 8px;
        }
        .row { display: flex; justify-content: space-between; align-items: center; }
        .btns { display: flex; gap: 4px; }
        
        button { 
            background: #fff; border: 1px solid #ff69b4; color: #ff69b4; 
            padding: 8px 10px; border-radius: 6px; font-weight: bold; font-size: 11px;
        }
        button:active { background: #ff69b4; color: white; }
        select { border: 1px solid #ff69b4; border-radius: 5px; padding: 5px; font-size: 11px; width: 90px; }
        
        #pattern-tab { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 500; padding: 25px; box-sizing: border-box; overflow-y: auto;
        }
    </style>
</head>
<body>

<div id="canvas-area"></div>

<div id="hud">
    <div class="row">
        <select id="p-sel"><option value="b">BODY</option><option value="eL">EYE L</option><option value="eR">EYE R</option></select>
        <div class="btns">
            <button onclick="adj('w',-0.5)">W-</button><button onclick="adj('w',0.5)">W+</button>
            <button onclick="adj('h',-0.5)">H-</button><button onclick="adj('h',0.5)">H+</button>
        </div>
    </div>
    <div class="row">
        <div class="btns" style="width:100%; justify-content: space-around;">
            <button onclick="adj('x',-0.5)">LEFT</button><button onclick="adj('x',0.5)">RIGHT</button>
            <button onclick="adj('y',-0.5)">DOWN</button><button onclick="adj('y',0.5)">UP</button>
            <button onclick="adj('z',-0.5)">BACK</button><button onclick="adj('z',0.5)">FRONT</button>
        </div>
    </div>
    <button style="background:#ff69b4; color:white; width:100%; border:none;" onclick="gen()">VIEW PATTERN</button>
</div>

<div id="pattern-tab">
    <button onclick="document.getElementById('pattern-tab').style.display='none'" style="width:100%; background:#333; color:white; padding:10px; border:none; border-radius:5px;">CLOSE</button>
    <div id="p-text" style="margin-top:20px; font-size:15px; line-height:1.6;"></div>
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>

<script>
    let scene, camera, renderer, b, el, er;
    let s = { b:{w:10,h:12,x:0,y:0,z:0}, el:{w:1.5,h:1.5,x:-2.5,y:3,z:4.5}, er:{w:1.5,h:1.5,x:2.5,y:3,z:4.5} };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 45);
        camera.lookAt(0, 5, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-area').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        
        b = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 32), new THREE.MeshPhongMaterial({color:0xff69b4, wireframe:true}));
        el = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 16), new THREE.MeshPhongMaterial({color:0x000000}));
        er = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 16), new THREE.MeshPhongMaterial({color:0x000000}));
        scene.add(b); scene.add(el); scene.add(er);
        
        upd();
        loop();
    }

    function adj(p, v) {
        let k = document.getElementById('p-sel').value;
        s[k][p] += v;
        upd();
    }

    function upd() {
        b.scale.set(s.b.w/2, s.b.h/2, s.b.w/2); b.position.set(s.b.x, s.b.y, s.b.z);
        el.scale.set(s.el.w/2, s.el.h/2, s.el.w/2); el.position.set(s.el.x, s.el.y, s.el.z);
        er.scale.set(s.er.w/2, s.er.h/2, s.er.w/2); er.position.set(s.er.x, s.er.y, s.er.z);
    }

    function loop() { requestAnimationFrame(loop); renderer.render(scene, camera); }

    function gen() {
        let w = s.b.w; let h = s.b.h;
        let sts = Math.round((Math.PI * w) / 0.5 / 6) * 6;
        let p = `<b>McKayla's Pattern (${w}x${h})</b><br>R1: MR 6<br>`;
        let cur = 6; let r = 2;
        while(cur < sts) { cur += 6; p += `R${r}: (sc ${(cur/6)-2}, inc) x 6 (${cur})<br>`; r++; }
        let mid = Math.round((h - w*0.8)/0.5);
        for(let i=0; i<Math.max(1, mid); i++) { p += `R${r}: sc around (${cur})<br>`; r++; }
        while(cur > 6) { cur -= 6; p += `R${r}: (sc ${(cur/6)-1}, dec) x 6 (${cur})<br>`; r++; }
        document.getElementById('p-text').innerHTML = p + "Fasten off.";
        document.getElementById('pattern-tab').style.display = 'block';
    }

    window.onload = () => { setTimeout(init, 300); };
</script>
</body>
</html>
