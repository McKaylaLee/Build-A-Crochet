<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v3.5.9</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #fff0f5; color: #333; height: 100vh; display: flex; flex-direction: column; }
        #header { background: white; padding: 15px; text-align: center; border-bottom: 4px solid #ff69b4; }
        #header h1 { margin: 0; color: #d02090; font-size: 24px; text-transform: uppercase; }
        #version-tag { position: absolute; top: 10px; left: 10px; background: #ff1493; color: white; padding: 5px 15px; border-radius: 15px; font-size: 11px; font-weight: bold; }
        
        #main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* The Design Area */
        #design-zone { flex: 1; background: #fdfdfd; border-right: 2px solid #ffc0cb; display: flex; align-items: center; justify-content: center; position: relative; }
        
        /* The Info Panel */
        #info-panel { width: 380px; background: white; padding: 25px; display: flex; flex-direction: column; overflow-y: auto; }
        
        button { background: #ff1493; color: white; border: none; padding: 15px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; box-shadow: 0 4px 0 #b01060; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #b01060; }

        #pattern-box { margin-top: 20px; padding: 15px; background: #fff9fb; border: 1px solid #ffc0cb; border-radius: 10px; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.6; white-space: pre-wrap; }
        
        .handle { cursor: nwse-resize; fill: white; stroke: #d02090; stroke-width: 2; }
        .measure-text { font-weight: bold; font-size: 14px; fill: #d02090; font-family: sans-serif; pointer-events: none; }
    </style>
</head>
<body>

<div id="version-tag">🧸 v3.5.9 🧸</div>

<div id="header">
    <h1>✨ Build-A-Crochet ✨</h1>
</div>

<div id="main-container">

            <text x="250" y="280" text-anchor="middle" class="measure-text">L: <tspan id="txt-l">10.0</tspan>cm</text>

            <circle id="handle-w" class="handle" cx="325" cy="250" r="8" /> <circle id="handle-h" class="handle" cx="250" cy="325" r="8" /> </svg>
    </div>

    <div id="info-panel">
        <p style="font-size: 13px; color: #666; margin-bottom: 20px; background: #fff0f5; padding: 10px; border-radius: 8px;">
            ⚪ <b>Pull the white circles</b> on the ball to change the size!
        </p>
        <button onclick="generate()">🧶 GENERATE PATTERN</button>
        <div id="pattern-box">Your pattern will appear here...</div>
    </div>
</div>
