<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Build-A-Crochet v5.0.4</title>
    <style>
        body { margin: 0; font-family: sans-serif; overflow: hidden; background: #ffffff; touch-action: none; }
        #top-bar { 
            position: absolute; top: 0; left: 0; width: 100%; height: 95px;
            background: rgba(255, 255, 255, 0.9); display: flex; flex-direction: column; 
            justify-content: center; border-bottom: 2px solid #ff69b4; z-index: 999;
        }
        .row { display: flex; justify-content: space-around; width: 100%; padding: 2px 0; }
        .item { display: flex; align-items: center; gap: 4px; scale: 0.85; }
        label { font-size: 10px; color: #ff69b4; font-weight: bold; min-width: 45px; }
        select, input { background: #fff; border: 1px solid #ccc; font-size: 11px; border-radius: 4px; padding: 2px; text-align: center; }
        .btn-s { background: #eee; border: 1px solid #ccc; width: 28px; height: 28px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        button#gen-btn { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #ff69b4; color: white; border: none; padding: 15px 30px; 
            border-radius: 30px; font-weight: bold; cursor: pointer; z-index: 999;
        }
    </style>
</head>
<body>

<div id="top-bar">
    <div class="row">
        <div class="item">
            <label>PART</label>
            <select id="part-sel" onchange="syncUI()" style="width:80px;">
                <option value="body">Body</option>
                <option value="eyeL">Eye L</option>
                <option value="eyeR">Eye R</option>
            </select>
        </div>
        <div class="item">
            <label>WIDTH</label>
            <button class="btn-s" onclick="adjust('w',-0.5)">-</button>
            <input id="in-w" value="10.0" style="width:35px;" readonly>
            <button class="btn-s" onclick="adjust('w',0.5)">+</button>
        </div>
    </div>
    <div class="row">
        <div class="item">
            <label>HEIGHT</label>
            <button class="btn-s" onclick="adjust('h',-0.5)">-</button>
            <input id="in-h" value="12.0" style="width:35px;" readonly>
            <button class="btn-s" onclick="adjust('h',0.5)">+</button>
        </div>
        <div class="item">
            <label>POS X/Y</label>
            <button class="btn-s" onclick="adjust('x',-0.5)">X-</button>
            <button class="btn-s" onclick="adjust('y',0.5)">Y+</button>
        </div>
    </div>
</div>

<button id="gen-btn" onclick="generateClassicPattern()">GENERATE PATTERN</button>
<div id="canvas-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls;
    let parts = {
        body: { mesh: null, w: 10.0, h: 12.0, x: 0, y: 0, z: 0, color: 0xff69b4, type: 'egg' },
        eyeL: { mesh: null, w: 2.0, h: 2.0, x: -2.5, y: 3, z: 4.5, color: 0x222222, type: 'eye' },
        eyeR: { mesh: null, w: 2.0, h: 2.0, x: 2.5, y: 3, z: 4.5, color: 0x222222, type: 'eye' }
    };

    function init() {
        if (typeof THREE === 'undefined') { setTimeout(init, 100); return; }
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 20, 50);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        let light = new THREE.PointLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        scene.add(light);
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        updateMeshes();
        animate();
    }

    function adjust(prop, val) {
        let p = document.getElementById('part-sel').value;
        parts[p][prop] += val;
        syncUI();
        updateMeshes();
    }

    function syncUI() {
        let p = document.getElementById('part-sel').value;
        document.getElementById('in-w').value = parts[p].w.toFixed(1);
        document.getElementById('in-h').value = (parts[p].h || parts[p].w).toFixed(1);
    }

    function updateMeshes() {
        Object.keys(parts).forEach(key => {
            let d = parts[key];
            if(d.mesh) scene.remove(d.mesh);
            let geo;
            if(key === 'body') {
                geo = new THREE.SphereGeometry(1, 32, 32);
                geo.scale(d.w/2, d.h/2, d.w/2); // Stretches the sphere!
            } else {
                geo = new THREE.SphereGeometry(d.w/2, 16, 16);
            }
            d.mesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color: d.color, wireframe: key==='body' }));
            d.mesh.position.set(d.x, d.y, d.z);
            scene.add(d.mesh);
        });
    }

    function generateClassicPattern() {
        const d = parts.body;
        const gauge = 0.5; // cm per stitch roughly
        let maxSts = Math.round((Math.PI * d.w) / gauge);
        maxSts = Math.round(maxSts / 6) * 6; // Round to multiple of 6
        
        let log = `<h2>McKayla's Amigurumi Pattern</h2>`;
        log += `<b>Body Size:</b> ${d.w}cm wide, ${d.h}cm tall<br><hr>`;
        log += `R1: Magic Ring 6 sc (6)<br>`;
        
        let currentSts = 6;
        let row = 2;
        
        // Increase Section
        while(currentSts < maxSts) {
            currentSts += 6;
            let repeat = currentSts / 6 - 2;
            log += `R${row}: (sc ${repeat > 0 ? repeat : ''}, inc) x 6 (${currentSts})<br>`;
            row++;
        }
        
        // Straight Section (based on height)
        let straightRows = Math.max(1, Math.round((d.h - d.w) / gauge));
        for(let i=0; i < straightRows; i++) {
            log += `R${row}: sc in each st (${currentSts})<br>`;
            row++;
        }
        
        // Decrease Section
        while(currentSts > 6) {
            let repeat = currentSts / 6 - 2;
            currentSts -= 6;
            log += `R${row}: (sc ${repeat > 0 ? repeat : ''}, dec) x 6 (${currentSts})<br>`;
            row++;
        }
        log += `R${row}: Close and weave in ends.`;

        const win = window.open("", "_blank");
        win.document.write(log);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    window.onload = init;
</script>
</body>
</html>
