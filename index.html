<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v5.53.0 - Builder Mode</title>
    <style>
        :root {
            --bg: #f5f5f2;
            --panel: #ffffff;
            --line: #d8d8d2;
            --soft: #ecece6;
            --text: #1f1f1c;
            --muted: #66665f;
            --accent: #ff6ea8;
            --accent-2: #ffd84d;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: monospace;
            touch-action: none;
            user-select: none;
        }

        #app {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 108px 1fr 240px;
            grid-template-rows: 62px 1fr;
            grid-template-areas:
                "left top right"
                "left canvas right";
        }

        #leftbar, #topbar, #rightbar {
            background: var(--panel);
            z-index: 10;
        }

        #leftbar {
            grid-area: left;
            border-right: 1px solid var(--line);
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
        }

        #topbar {
            grid-area: top;
            border-bottom: 1px solid var(--line);
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        #rightbar {
            grid-area: right;
            border-left: 1px solid var(--line);
            padding: 14px 12px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        #canvas-wrap {
            grid-area: canvas;
            position: relative;
            overflow: hidden;
        }

        .stack { display: flex; flex-direction: column; gap: 8px; }
        .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .label {
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.4px;
        }

        .btn {
            border: 1px solid var(--line);
            background: var(--soft);
            color: var(--text);
            border-radius: 8px;
            padding: 8px 6px;
            cursor: pointer;
            font: inherit;
            font-size: 10px;
            line-height: 1.1;
            text-align: center;
            min-height: 42px;
        }

        .tool-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            min-height: 54px;
        }

        .tool-btn .icon {
            font-size: 17px;
            line-height: 1;
        }

        .shape-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: flex-start;
            padding-left: 8px;
            min-height: 40px;
        }

        .shape-icon {
            width: 18px;
            text-align: center;
            font-size: 14px;
            line-height: 1;
            color: var(--muted);
            flex: 0 0 18px;
        }

        .shape-label {
            font-size: 10px;
        }

        .btn.active {
            background: var(--accent);
            color: #fff;
            border-color: #ff9bc2;
        }

        .btn.active .shape-icon {
            color: #fff;
        }

        .divider {
            height: 1px;
            background: var(--line);
            margin: 2px 0;
        }

        .top-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .top-btn {
            min-height: 36px;
            min-width: 66px;
            padding: 8px 10px;
        }

        .title {
            font-weight: bold;
            font-size: 12px;
        }

        .subtitle {
            font-size: 10px;
            color: var(--muted);
        }

        .panel-card {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px;
            background: #fcfcfa;
        }

        .value {
            font-size: 12px;
            color: var(--text);
        }

        .mini-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .swatch {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.12);
            cursor: pointer;
        }

        #mode-hint {
            position: absolute;
            left: 14px;
            bottom: 14px;
            background: rgba(255,255,255,0.88);
            border: 1px solid var(--line);
