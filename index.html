<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v5.29.0 - Visible Grid</title>
    <style>
        body { margin: 0; background-color: #ffffff; color: #111; overflow: hidden; display: flex; font-family: monospace; touch-action: none; user-select: none; }
        #panel { width: 80px; height: 100vh; background: #f0f0f0; border-right: 1px solid #ccc; display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 1000; position: absolute; left: 0; top: 0; }
        .btn { width: 50px; height: 50px; cursor: pointer; border: 2px solid #fff; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 10px; border-radius: 8px; background: #ddd; text-align: center; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        .egg-btn { background: #ff69b4; border-radius: 50%; width: 40px; height: 50px; margin-top: 10px; }
        .egg-btn.active { background: #28a745; box-shadow: 0 0 15px rgba(40,167,69,0.5); }
        .history-btn { background: #333; color: white; }
        #v-tag { position: absolute; bottom: 20px; right: 20px; color: #444; font-size: 12px; font-weight: bold; pointer-events: none; z-index: 50; background: rgba(255,255,255,0.8); padding: 4px; border-radius: 4px; }
        #palette { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.9); padding: 10px; border-radius: 12px; display: none; grid-template-columns: repeat(2, 1fr); gap: 5px; border: 1px solid #ccc; z-index: 200; }
        .color-dot { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
        #select-box { border: 2px dashed #ff69b4; background: rgba(255, 105, 180, 0.05); position: absolute; pointer-events: none; display: none; z-index: 10; }
    </style>
</head>
<body>

<div id="panel">
    <div class="btn history-btn" onclick="executeUndo()">UNDO</div>
    <div class="btn history-btn" onclick="executeRedo()">REDO</div>
    <div id="egg-spawn-btn" class="btn egg-btn" onclick="togglePlacementMode()"></div>
</div>

<div id="v-tag">Build-A-Crochet v5.29.0</div>
<div id="select-box"></div>
<div id="palette">
    <div class="color-dot" style="background: #ff69b4;" onclick="updateColor('#ff69b4')"></div>
    <div class="color-dot" style="background: #ffffff;" onclick="updateColor('#ffffff')"></div>
    <div class="color-dot" style="background: #000000;" onclick="updateColor('#000000')"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, currentEgg, ghostEgg;
    let isPlacementMode = false, dragTarget = null, isDragging = false;
    let handles = [], groupHandles = [], groupRotHandles = [], groupGizmo;
    let startScale, mouseButton, startHandleDist = 1;
    let undoStack = [], redoStack = [];
    let currentSelection = [], isBoxSelecting = false, boxStart = new THREE.Vector2();
    let startGroupData = [], startMouseAngle = 0;
    
    const BASE_H = 20, BASE_R = 7, H_OFFSET = 7;

    function init() {
        scene = new THREE.Scene(); 
        scene.background = new THREE.Color(0xffffff);
        
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(150, 150, 150);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());
        
        // --- THE FIXED GRID ---
        const grid = new THREE.GridHelper(1000, 50, 0x888888, 0xdddddd);
        grid.position.y = -0.1; 
        scene.add(grid);
        
        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6); 
        dirLight.position.set(100, 200, 100); 
        scene.add(dirLight);
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: null };
        
        createHandles(); createGroupGizmo(); createGhost();
        
        window.addEventListener('pointerdown', onDown);
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        window.addEventListener('keydown', onKey);
        window.addEventListener('resize', onResize);
        
        captureState(); 
        animate();
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function onKey(e) {
        if (e.key === "Delete" || e.key === "Backspace") {
            const targets = currentEgg ? [currentEgg] : [...currentSelection];
            if (targets.length > 0) {
                targets.forEach(o => { 
                    if(o.userData.outline) scene.remove(o.userData.outline);
                    o.geometry.dispose(); o.material.dispose(); scene.remove(o); 
                });
                updateSelectionVisuals([]);
                captureState();
            }
        }
    }

    function createEgg(color, isGhost = false) {
        const points = []; for (let i = 0; i <= 20; i++) {
            const t = i / 20, y = t * BASE_H, r = BASE_R * Math.sqrt(Math.max(0, 1 - Math.pow((y - 10) / 10, 2)));
            points.push(new THREE.Vector2(Math.max(0.1, r), y));
        }
        const geo = new THREE.LatheGeometry(points, 32); geo.translate(0, -10, 0);
        geo.userData.origPos = geo.attributes.position.clone();
        const mat = new THREE.MeshPhongMaterial({ color, wireframe: true, transparent: true, opacity: isGhost ? 0.3 : 0.8 });
        const egg = new THREE.Mesh(geo, mat);
        if (!isGhost) {
            egg.userData.isEgg = true;
            egg.userData.data = { scale: new THREE.Vector3(1, 1, 1), offsets: Array.from({length: 6}, () => new THREE.Vector3()) };
            const outline = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.BackSide }));
            outline.scale.set(1.02, 1.02, 1.02); egg.add(outline); egg.userData.outline = outline;
        }
        return egg;
    }

    function updateMesh(egg) {
        if(!egg) return;
        const pos = egg.geometry.attributes.position, orig = egg.geometry.userData.origPos;
        const { scale, offsets } = egg.userData.data;
        const ctrls = [new THREE.Vector3(0,10,0), new THREE.Vector3(0,-10,0), new THREE.Vector3(-7,0,0), new THREE.Vector3(7,0,0), new THREE.Vector3(0,0,7), new THREE.Vector3(0,0,-7)];
        for (let i = 0; i < orig.count; i++) {
            const v = new THREE.Vector3(orig.getX(i), orig.getY(i), orig.getZ(i)), sV = v.clone().multiply(scale);
            let tw = 0; const sOff = new THREE.Vector3();
            for (let j = 0; j < 6; j++) {
                const w = 1 / Math.pow(v.distanceTo(ctrls[j]) + 1, 3.5); tw += w;
                sOff.add(offsets[j].clone().multiplyScalar(w));
            }
            pos.setXYZ(i
