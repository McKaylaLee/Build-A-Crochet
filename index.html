<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Build-A-Crochet PRO v4.3.8</title>
    <style>
        body { margin: 0; font-family: sans-serif; overflow: hidden; background: #ffffff; color: #333; touch-action: none; }
        
        #top-bar { 
            position: absolute; top: 0; left: 0; width: 100%; height: 75px;
            background: rgba(255, 255, 255, 0.95); display: flex; align-items: center; 
            justify-content: space-around; padding: 0 10px; box-sizing: border-box;
            border-bottom: 2px solid #ff69b4; z-index: 200;
        }
        
        .item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        label { font-size: 10px; color: #ff69b4; font-weight: bold; }
        select { background: #fff; border: 1px solid #ddd; color: #333; border-radius: 4px; padding: 4px; font-size: 11px; width: 90px; }
        
        /* Step Buttons for Mobile */
        .stepper { display: flex; align-items: center; background: #f0f0f0; border-radius: 4px; border: 1px solid #ddd; }
        .stepper button { background: #eee; border: none; width: 28px; height: 28px; font-weight: bold; cursor: pointer; color: #333; }
        .stepper input { background: transparent; border: none; color: #333; width: 45px; text-align: center; font-size: 13px; font-weight: bold; }

        #canvas-container { width: 100vw; height: 100vh; }
        
        button#gen-btn { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #ff69b4; color: white; border: none; padding: 15px 30px; 
            border-radius: 30px; font-weight: bold; cursor: pointer; z-index: 150;
            box-shadow: 0 5px 20px rgba(255, 105, 180, 0.4);
        }
        
        #version-tag { position: absolute; bottom: 10px; right: 15px; font-size: 10px; color: #bbb; pointer-events: none; }
    </style>
</head>
<body>

<div id="top-bar">
    <div class="item">
        <label>YARN</label>
        <select id="yarn-selector">
            <option value="0">0: Lace</option>
            <option value="1">1: Super Fine</option>
            <option value="2">2: Fine</option>
            <option value="3">3: Light</option>
            <option value="4" selected>4: Worsted</option>
            <option value="5">5: Bulky</option>
            <option value="6">6: Super Bulky</option>
            <option value="7">7: Jumbo</option>
        </select>
    </div>
    <div class="item">
        <label>WIDTH(cm)</label>
        <div class="stepper">
            <button onclick="changeVal('in-w', -0.5)">-</button>
            <input type="number" id="in-w" value="13.5" readonly>
            <button onclick="changeVal('in-w', 0.5)">+</button>
        </div>
    </div>
    <div class="item">
        <label>HEIGHT(cm)</label>
        <div class="stepper">
            <button onclick="changeVal('in-h', -0.5)">-</button>
            <input type="number" id="in-h" value="26.0" readonly>
            <button onclick="changeVal('in-h', 0.5)">+</button>
        </div>
    </div>
</div>

<button id="gen-btn" onclick="generatePattern()">GENERATE PATTERN</button>
<div id="version-tag">Build-A-Crochet PRO v4.3.8</div>

<div id="canvas-container"></div>
