<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Build-A-Crochet Workshop v5.0.0</title>
    <style>
        body { margin: 0; font-family: sans-serif; overflow: hidden; background: #ffffff; touch-action: none; }
        
        /* 콤팩트 대시보드 */
        #top-bar { 
            position: absolute; top: 0; left: 0; width: 100%; height: 90px;
            background: rgba(255, 255, 255, 0.95); display: flex; flex-direction: column;
            justify-content: center; border-bottom: 2px solid #ff69b4; z-index: 999;
        }
        
        .row { display: flex; justify-content: space-around; align-items: center; width: 100%; margin: 2px 0; }
        .item { display: flex; align-items: center; gap: 5px; }
        label { font-size: 10px; color: #ff69b4; font-weight: bold; min-width: 40px; }
        
        select, input { font-size: 11px; padding: 2px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-s { background: #f0f0f0; border: 1px solid #ccc; width: 22px; height: 22px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        #canvas-container { width: 100vw; height: 100vh; }
        
        button#gen-btn { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #ff69b4; color: white; border: none; padding: 12px 25px; 
            border-radius: 30px; font-weight: bold; cursor: pointer; z-index: 999;
        }
        #v-tag { position: absolute; bottom: 8px; right: 10px; font-size: 9px; color: #ddd; }
    </style>
</head>
<body>

<div id="top-bar">
    <div class="row">
        <div class="item">
            <label>PART</label>
            <select id="part-sel" onchange="syncUI()">
                <option value="body">Body (Main)</option>
                <option value="eyeL">Left Eye</option>
                <option value="eyeR">Right Eye</option>
            </select>
        </div>
        <div class="item">
            <label>YARN</label>
            <select id="yarn-sel">
