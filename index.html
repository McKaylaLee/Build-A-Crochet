<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>McKayla's Crochet Lab v3.4.4</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #fff0f5; overflow: hidden; }
        #version-tag { position: absolute; top: 10px; left: 10px; background: #ff1493; color: white; padding: 5px 15px; border-radius: 15px; font-size: 12px; z-index: 100; font-weight: bold; }
        #main-container { display: flex; height: 100vh; }
        #viewer { flex: 1; background: #fafafa; border-right: 2px solid #ffc0cb; cursor: move; }
        #controls-panel { width: 350px; background: white; padding: 20px; display: flex; flex-direction: column; border-left: 2px solid #ffc0cb; }
        .input-group { margin-bottom: 20px; }
        label { font-weight: bold; color: #d02090; display: block; margin-bottom: 10px; }
        input[type=range] { width: 100%; accent-color: #ff69b4; }
        button { background: #ff69b4; color: white; border: none; padding: 15px; border-radius: 25px; font-weight: bold; cursor: pointer; width: 100%; }
        #pattern-output { flex: 1; overflow-y: auto; margin-top: 20px; white-space: pre-wrap; font-family: monospace; font-size: 13px; border-top: 1px solid #eee; padding-top: 15px; }
        .stuff-tag { background: #ff1493; color: white; padding: 2px 6px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div id="version-tag">🧸 v3.4.4 🧸</div>

<div id="main-container">
    <div id="viewer"></div>
    <div id="controls-panel">
        <div class="input-group">
            <label>Sphere Size: <span id="r-val">10</span>cm</label>
            <input type="range" id="r-slider" min="2" max="30" value="10">
        </div>
        <button onclick="makePattern()">✨ Generate Pattern</button>
        <div id="pattern-output">Change the slider and click generate!</div>
    </div>
</div>

<script>
    // 1. Setup Scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xfff9fb);
    const viewer = document.getElementById('viewer');
    const camera = new THREE.PerspectiveCamera(75, viewer.clientWidth / viewer.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(viewer.clientWidth, viewer.clientHeight);
    viewer.appendChild(renderer.domElement);

    // 2. Add Sphere
    const geometry = new THREE.SphereGeometry(1, 64, 64);
    const material = new THREE.MeshPhongMaterial({ color: 0xff69b4, shininess: 50 });
    const sphere = new THREE.Mesh(geometry, material);
    scene.add(sphere);

    // 3. Add Lights
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 5, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));

    camera.position.z = 10;

    // 4. Zoom & Spin Logic
    let isDown = false;
    viewer.onmousedown = () => isDown = true;
    window.onmouseup = () => isDown = false;
    viewer.onmousemove = (e) => {
        if(isDown) {
            sphere.rotation.y += e.movementX * 0.01;
            sphere.rotation.x += e.movementY * 0.01;
        }
    };
    viewer.onwheel = (e) => {
        e.preventDefault();
        camera.position.z += e.deltaY * 0.02;
        camera.position.z = Math.min(Math.max(camera.position.z, 2), 50);
    };

    function animate() {
        requestAnimationFrame(animate);
        if(!isDown) sphere.rotation.y += 0.005;
        renderer.render(scene, camera);
    }
    animate();

    // 5. Pattern Logic
    const slider = document.getElementById('r-slider');
    const rText = document.getElementById('r-val');
    
    slider.oninput = function() {
        rText.innerText = this.value;
        const s = this.value / 5;
        sphere.scale.set(s, s, s);
    };

    function makePattern() {
        const d = slider.value;
        const incRounds = Math.max(2, Math.floor((d/2) * 1.5));
        let output = "<b>🧶 SPHERE PATTERN (" + d + "cm)</b>\n\n";
        output += "R1: MR 6\nR2: (inc) x 6\n";
        
        let sts = 12;
        for (let i = 1; i < incRounds; i++) {
            sts += 6;
            output += "R" + (i+2) + ": (sc " + i + ", inc) x 6 [" + sts + "]\n";
        }
        
        output += "\n✨ MIDDLE (" + Math.floor(incRounds * 0.8) + " rows)\n";
        
        output += "\n✨ DECREASES\n";
        for (let k = incRounds - 1; k >= 1; k--) {
            sts -= 6;
            output += "sc " + k + ", dec... [" + sts + "]";
            if (sts <= 18) output += " <span class='stuff-tag'>Stuff</span>";
            output += "\n";
        }
        document.getElementById('pattern-output').innerHTML = output;
    }
</script>
</body>
</html>
