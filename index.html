<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Build-A-Crochet PRO v4.3.5</title>
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; overflow: hidden; background: #ffffff; color: #333; touch-action: none; }
        
        /* Top Navigation */
        #top-bar { 
            position: absolute; top: 0; left: 0; width: 100%; height: 75px;
            background: rgba(255, 255, 255, 0.9); display: flex; align-items: center; 
            justify-content: space-around; padding: 0 5px; box-sizing: border-box;
            border-bottom: 2px solid #ff69b4; z-index: 200;
        }
        
        .item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        label { font-size: 9px; color: #ff69b4; font-weight: bold; }
        select { background: #fff; border: 1px solid #ddd; color: #333; border-radius: 4px; padding: 5px; font-size: 11px; width: 95px; }
        
        /* Mobile Stepper Controls */
        .stepper { display: flex; align-items: center; background: #f9f9f9; border-radius: 4px; border: 1px solid #ddd; }
        .stepper button { background: #eee; color: #333; border: none; width: 30px; height: 30px; font-weight: bold; cursor: pointer; }
        .stepper input { background: transparent; border: none; color: #333; width: 45px; text-align: center; font-size: 14px; font-weight: bold; }
        
        /* Center Viewport with Bottom Padding to avoid button overlap */
        #canvas-container { width: 100vw; height: 100vh; padding-bottom: 80px; box-sizing: border-box; }
        
        /* Bottom Action Button */
        #btn-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 90px;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(to top, rgba(255,255,255,1) 60%, rgba(255,255,255,0));
            z-index: 150;
        }
        button#gen-btn { 
            background: #ff69b4; color: white; border: none; padding: 15px 40px; 
            border-radius: 40px; font-weight: bold; cursor: pointer; font-size: 16px;
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.4);
        }
        
        #version-tag { position: absolute; bottom: 5px; right: 10px; font-size: 10px; color: #ccc; }
    </style>
</head>
<body>

<div id="top-bar">
    <div class="item">
        <label>YARN WEIGHT</label>
        <select id="yarn-selector">
            <option value="0">0: Lace</option><option value="1">1: Super Fine</option>
            <option value="2">2: Fine</option><option value="3">3: Light</option>
            <option value="4" selected>4: Worsted</option><option value="5">5: Bulky</option>
            <option value="6">6: Super Bulky</option><option value="7">7: Jumbo</option>
        </select>
    </div>
    <div class="item"><label>WIDTH (CM)</label>
        <div class="stepper"><button onclick="step('in-w', -0.5)">-</button><input type="number" id="in-w" value="13.5" readonly><button onclick="step('in-w', 0.5)">+</button></div>
    </div>
    <div class="item"><label>HEIGHT (CM)</label>
        <div class="stepper"><button onclick="step('in-h', -0.5)">-</button><input type="number" id="in-h" value="26.0" readonly><button onclick="step('in-h', 0.5)">+</button></div>
    </div>
</div>

<div id="btn-container">
    <button id="gen-btn" onclick="generatePattern()">GENERATE PATTERN</button>
</div>

<div id="version-tag">Build-A-Crochet PRO v4.3.5</div>
<div id="canvas-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    };

    function step(id, val) {
        const input = document.getElementById(id);
        input.value = (parseFloat(input.value) + val).toFixed(1);
    }

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / (window.innerHeight - 80), 0.1, 1000);
        camera.position.set(25, 25, 60);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight - 80);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const pointLight = new THREE.PointLight(0xffffff, 0.5);
        pointLight.position.set(20, 30, 20);
        scene.add(pointLight);

        // Subtle Grid for Perspective
        const grid = new THREE.GridHelper(100, 20, 0xeeeeee, 0xf5f5f5);
        scene.add(grid);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        animate();
    }
