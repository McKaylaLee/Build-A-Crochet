<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Build-A-Crochet PRO v4.3.0 | Sculpting Lab</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; background: #1a1a1a; color: #fff; touch-action: none; }
        
        /* New Horizontal Top Control Bar */
        #top-controls { 
            position: absolute; top: 0; left: 0; width: 100%; height: 50px;
            background: rgba(30, 30, 30, 0.9); display: flex; align-items: center; 
            justify-content: space-around; padding: 0 10px; box-sizing: border-box;
            border-bottom: 1px solid #ff69b4; z-index: 200;
        }
        
        .control-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
        label { color: #aaa; font-weight: bold; }
        select, input { padding: 4px; background: #222; border: 1px solid #444; color: #fff; border-radius: 4px; font-size: 12px; }
        input[type="number"] { width: 50px; }
        
        /* Sculpting Instruction Overlay */
        #sculpt-info {
            position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 20px;
            font-size: 11px; color: #ff69b4; pointer-events: none; z-index: 100;
        }

        /* Bottom Action Button */
        #bottom-bar {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60px;
            display: flex; align-items: center; justify-content: center; z-index: 150;
        }
        button#gen-btn { 
            background: #ff69b4; color: white; border: none; padding: 12px 24px; 
            border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 14px;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4); transition: 0.2s;
        }
        button#gen-btn:hover { background: #ff1493; transform: scale(1.05); }

        #canvas-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="top-controls">
    <div class="control-item">
        <label>Yarn:</label>
        <select id="yarn-selector">
            <option value="0">0: Lace</option>
            <option value="1">1: Super Fine</option>
            <option value="2">2: Fine</option>
            <option value="3">3: Light</option>
            <option value="4" selected>4: Worsted</option>
            <option value="5">5: Bulky</option>
            <option value="6">6: Super Bulky</option>
            <option value="7">7: Jumbo</option>
        </select>
    </div>
    <div class="control-item">
        <label>Width:</label>
        <input type="number" id="in-w" value="13.5" step="0.1"> cm
    </div>
    <div class="control-item">
        <label>Height:</label>
        <input type="number" id="in-h" value="26.0" step="0.1"> cm
    </div>
</div>

<div id="sculpt-info">Drag Gray Handles to Sculpt the Curve</div>

<div id="bottom-bar">
    <button id="gen-btn" onclick="generatePatternInNewWindow()">GENERATE PATTERN IN NEW WINDOW</button>
</div>

<div id="canvas-container"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { TransformControls } from 'three/addons/controls/TransformControls.js';

    let scene, camera, renderer, controls, mainObject;
    let raycaster, mouse;
    let currentHandle = null;
    let handleControls;

    // Sculpting control points (normalized -1 to 1 height)
    let profilePoints = [
        { y: 0.7, r: 0.6, mesh: null }, // Top bulge
        { y: 0.0, r: 1.0, mesh: null }, // Middle width
        { y: -0.7, r: 0.6, mesh: null } // Bottom bulge
    ];

    const yarnData = {
        "0": { gh: 9.0, gv: 11.0 }, "1": { gh: 7.5, gv: 9.0 }, "2": { gh: 6.5, gv: 7.5 },
        "3": { gh: 5.5, gv: 6.5 }, "4": { gh: 4.5, gv: 5.0 }, "5": { gh: 3.5, gv: 4.0 },
        "6": { gh: 2.5, gv: 3.0 }, "7": { gh: 1.5, gv: 1.8 }
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 70);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const grid = new THREE.GridHelper(100, 20, 0x333333, 0x222222);
        grid.rotation.x = Math.PI / 2;
        scene.add(grid);

        // --- Main Sculptable Object (Lathe Geometry for smooth curves) ---
        updateGeometry();

        // --- View Controls ---
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };

        // --- Sculpting Interaction Setup ---
        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();
        
        // TransformControls for dragging handles
        handleControls = new TransformControls(camera, renderer.domElement);
        handleControls.setMode('translate');
        handleControls.showY = false; // Only drag sideways (width)
        handleControls.showZ = false;
        scene.add(handleControls);

        // Block OrbitControls when dragging a handle
        handleControls.addEventListener('dragging-changed', (event) => {
            controls.enabled = !event.value;
        });

        createHandles();

        window.addEventListener('resize', onWindowResize);
        window.addEventListener('pointerdown', onPointerDown);
        
        animate();
    }

    function createHandles() {
        const handleGeo = new THREE.SphereGeometry(1, 16, 16);
        const handleMat = new THREE.MeshBasicMaterial({ color: 0x888888, transparent: true, opacity: 0.8 });

        profilePoints.forEach((point, index) => {
            const handleMesh = new THREE.Mesh(handleGeo, handleMat);
            handleMesh.name = `handle_${index}`;
            scene.add(handleMesh);
            point.mesh = handleMesh;
        });
    }

    // Function to generate geometry based on profile points
    function updateGeometry() {
        if (mainObject) scene.remove(mainObject);

        const w = parseFloat(document.getElementById('in-w').value) || 10;
        const h = parseFloat(document.getElementById('in-h').value) || 10;

        // Create a smooth Spline curve for the profile
        const curvePoints = [];
        // Add absolute top/bottom points (radius 0)
        curvePoints.push(new THREE.Vector2(0, h / 2)); 
        
        profilePoints.forEach(p => {
            curvePoints.push(new THREE.Vector2((w/2) * p.r, (h/2) * p.y));
        });
        
        curvePoints.push(new THREE.Vector2(0, -h / 2));

        const spline = new THREE.CatmullRomCurve2(curvePoints);
        const points = spline.getPoints(64); // Smooth points along the curve

        // Create Lathe Geometry (rotates the 2D curve into 3D)
        const geometry = new THREE.LatheGeometry(points, 32);
        const material = new THREE.MeshPhongMaterial({ color: 0xff69b4, wireframe: true, side: THREE.DoubleSide });
        mainObject = new THREE.Mesh(geometry, material);
        scene.add(mainObject);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function onPointerDown(event) {
        // Calculate mouse position
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        
        // Check if we hit a handle
        const intersects = raycaster.intersectObjects(profilePoints.map(p => p.mesh));

        if (intersects.length > 0) {
            currentHandle = intersects[0].object;
            handleControls.attach(currentHandle);
        } else {
            // Clicked away, detach controls
            if (!handleControls.dragging) {
               // handleControls.detach();
            }
        }
    }

    function animate() {
        requestAnimationFrame(animate);

        const w = parseFloat(document.getElementById('in-w').value) || 10;
        const h = parseFloat(document.getElementById('in-h').value) || 10;

        // Update handle positions based on profile data and target dims
        profilePoints.forEach(p => {
            p.mesh.position.set((w/2) * p.r, (h/2) * p.y, 0);
        });

        // Update profile data if a handle was dragged
        if (handleControls.object) {
            const index = parseInt(handleControls.object.name.split('_')[1]);
            // Convert back to normalized radius (0-1)
            const newR = Math.max(0.1, handleControls.object.position.x / (w/2));
            profilePoints[index].r = newR;
            
            // Re-generate geometry on change
            updateGeometry(); 
        }

        controls.update();
        renderer.render(scene, camera);
    }

    window.generatePatternInNewWindow = function() {
        const w = parseFloat(document.getElementById('in-w').value);
        const h = parseFloat(document.getElementById('in-h').value);
        const yKey = document.getElementById('yarn-selector').value;
        const yarnName = document.getElementById('yarn-selector').options[document.getElementById('yarn-selector').selectedIndex].text;
        const g = yarnData[yKey];
        
        const totalRows = Math.round(h * g.gv);
        
        let patternText = `<h1>Crochet Pattern: Sculpted Egg</h1>\n`;
        patternText += `<p><strong>Dimensions:</strong> ${w}cm x ${h}cm<br>\n`;
        patternText += `<strong>Yarn:</strong> Standard Class ${yarnName}<br>\n`;
        patternText += `<strong>Total Rows:</strong> ${totalRows}</p>\n`;
        patternText += `<hr>\n<pre style="font-family: monospace; font-size: 14px; line-height: 1.6;">\n`;

        // RE-CREATE THE SPLINE TO SAMPLE IT for pattern slicing
        const curvePoints = [];
        curvePoints.push(new THREE.Vector2(0, h / 2)); 
        profilePoints.forEach(p => curvePoints.push(new THREE.Vector2((w/2) * p.r, (h/2) * p.y)));
        curvePoints.push(new THREE.Vector2(0, -h / 2));
        const spline = new THREE.CatmullRomCurve2(curvePoints);

        let prevSts = 0;
        let totalStitches = 0;

        for (let i = 1; i <= totalRows; i++) {
            // Find radius at this row height using the spline curve
            let rowProgress = i / totalRows; // 0 (top) to 1 (bottom)
            // Spline sampling is complex, this is a simplified interpolation:
            let normalizedY = ((i / g.gv) - (h / 2)) / (h / 2); // 1 (top) to -1 (bottom)
            
            // We need to sample the spline at the correct Y coordinate.
            // This differential sampling ensures precision.
            let sampledPoint = spline.getPoint(1 - rowProgress); // Reverse progress for correct matching

            let radius = sampledPoint.x;
            let circumference = 2 * Math.PI * radius;
            let sts = Math.max(0, Math.round(circumference * g.gh));
            
            // Precision Mode Force Starts/Ends
            if(i === 1 || i === totalRows) sts = 6;
            if(sts < 6 && (i < 5 || i > totalRows - 5)) sts = 6;

            let diff = sts - prevSts;
            let note = "";
            if (i > 1) {
                if (diff > 0) note = ` [Add ${diff} sts]`;
                else if (diff < 0) note = ` [Dec ${Math.abs(diff)} sts]`;
            }

            patternText += `R${i}: ${sts} sts${note}\n`;
            prevSts = sts;
            totalStitches += sts;
        }

        patternText += `\n--------------------------\nFinish: Stuff firmly and sew closed.\n`;
        patternText += `Total Stitches in Project: ~${totalStitches}</pre>\n`;

        // Create New Window
        const patternWindow = window.open("", "Crochet Pattern", "width=600,height=800");
        patternWindow.document.write(`
            <html>
            <head>
                <title>Your Pattern: ${w}x${h}cm Egg</title>
                <style>body{font-family:sans-serif; padding:40px; line-height:1.6;} h1{color:#ff69b4;}</style>
            </head>
            <body>${patternText}</body>
            </html>
        `);
        patternWindow.document.close();
    }

    init();
</script>
</body>
</html>
