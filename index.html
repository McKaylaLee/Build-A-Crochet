<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet PRO v4.2.0 | Precision Engine</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; background: #1a1a1a; color: #fff; }
        #ui-panel { position: absolute; top: 20px; left: 20px; width: 300px; background: rgba(30, 30, 30, 0.95); padding: 20px; border-radius: 15px; border: 1px solid #ff69b4; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #pattern-panel { position: absolute; top: 20px; right: 20px; width: 320px; bottom: 20px; background: rgba(30, 30, 30, 0.95); padding: 20px; border-radius: 15px; border: 1px solid #444; z-index: 100; display: flex; flex-direction: column; }
        
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; text-transform: uppercase; color: #ff69b4; margin-bottom: 5px; font-weight: bold; }
        select, input { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; outline: none; }
        
        #canvas-container { width: 100vw; height: 100vh; }
        
        button { background: #ff69b4; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 14px; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #ff1493; transform: translateY(-2px); }
        
        #output-log { flex: 1; background: #000; border-radius: 8px; padding: 15px; margin-top: 15px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 12px; line-height: 1.6; color: #00ff00; border: 1px solid #333; }
        .stats { font-size: 12px; color: #aaa; margin-top: 10px; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

<div id="ui-panel">
    <h2 style="margin:0 0 20px 0; color:#ff69b4;">🔬 Lab v4.2.0</h2>
    
    <div class="control-group">
        <label>Select Yarn Size (Standard)</label>
        <select id="yarn-selector">
            <option value="0">0: LACE (1.0mm)</option>
            <option value="1">1: SUPER FINE (2.0mm)</option>
            <option value="2">2: FINE (2.5mm)</option>
            <option value="3">3: LIGHT (3.0mm)</option>
            <option value="4" selected>4: MEDIUM/WORSTED (4.0mm)</option>
            <option value="5">5: BULKY (6.0mm)</option>
            <option value="6">6: SUPER BULKY (8.0mm)</option>
            <option value="7">7: JUMBO (12.0mm)</option>
        </select>
    </div>

    <div class="control-group">
        <label>Target Width (cm)</label>
        <input type="number" id="in-w" value="13.5" step="0.1">
    </div>

    <div class="control-group">
        <label>Target Height (cm)</label>
        <input type="number" id="in-h" value="26.0" step="0.1">
    </div>

    <button onclick="runSlicingEngine()">CONVERT TO PATTERN</button>
    
    <div class="stats" id="gauge-stats">
        Est. Horizontal: 4.5 sts/cm<br>
        Est. Vertical: 5.0 rows/cm
    </div>
</div>

<div id="pattern-panel">
    <h3 style="margin:0;">Precision Pattern Log</h3>
    <div id="output-log">> Waiting for conversion...</div>
</div>

<div id="canvas-container"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, object;
    const yarnData = {
        "0": { gh: 9.0, gv: 11.0 },
        "1": { gh: 7.5, gv: 9.0 },
        "2": { gh: 6.5, gv: 7.5 },
        "3": { gh: 5.5, gv: 6.5 },
        "4": { gh: 4.5, gv: 5.0 },
        "5": { gh: 3.5, gv: 4.0 },
        "6": { gh: 2.5, gv: 3.0 },
        "7": { gh: 1.5, gv: 1.8 }
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(20, 20, 50);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const light1 = new THREE.DirectionalLight(0xffffff, 1);
        light1.position.set(10, 20, 10);
        scene.add(light1);
        scene.add(new THREE.AmbientLight(0x404040));

        const axes = new THREE.AxesHelper(15);
        scene.add(axes);
        
        const grid = new THREE.GridHelper(100, 20, 0x333333, 0x222222);
        grid.rotation.x = Math.PI / 2;
        scene.add(grid);

        // Create initial Egg Mesh
        const geometry = new THREE.SphereGeometry(1, 64, 64);
        const material = new THREE.MeshPhongMaterial({ color: 0xff69b4, wireframe: true });
        object = new THREE.Mesh(geometry, material);
        scene.add(object);

        controls = new OrbitControls(camera, renderer.domElement);
        
        window.addEventListener('resize', onWindowResize);
        animate();
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const w = parseFloat(document.getElementById('in-w').value);
        const h = parseFloat(document.getElementById('in-h').value);
        object.scale.set(w/2, h/2, w/2);
        
        const y = document.getElementById('yarn-selector').value;
        document.getElementById('gauge-stats').innerHTML = `Est. Horizontal: ${yarnData[y].gh} sts/cm<br>Est. Vertical: ${yarnData[y].gv} rows/cm`;

        controls.update();
        renderer.render(scene, camera);
    }

    window.runSlicingEngine = function() {
        const w = parseFloat(document.getElementById('in-w').value);
        const h = parseFloat(document.getElementById('in-h').value);
        const yarnKey = document.getElementById('yarn-selector').value;
        const g = yarnData[yarnKey];
        
        const totalRows = Math.round(h * g.gv);
        const maxRadius = w / 2;
        
        let log = `[PRECISION REPORT V4.2.0]\n`;
        log += `Shape: Egg (${w}cm x ${h}cm)\n`;
        log += `Yarn Class: ${yarnKey}\n`;
        log += `Total Rows: ${totalRows}\n`;
        log += `--------------------------\n`;

        let prevSts = 0;
        for (let i = 1; i <= totalRows; i++) {
            // Ellipsoid Radius Calculation at height h
            // (y/H)^2 + (r/W)^2 = 1 -> r = W * sqrt(1 - (y/H)^2)
            let normalizedY = ((i / g.gv) - (h / 2)) / (h / 2);
            let radius = maxRadius * Math.sqrt(Math.max(0, 1 - Math.pow(normalizedY, 2)));
            let circumference = 2 * Math.PI * radius;
            let sts = Math.max(0, Math.round(circumference * g.gh));
            
            // At the very top/bottom, ensure at least 6 sts or 0
            if(i === 1 || i === totalRows) sts = 6;
            if(sts < 6 && (i < 5 || i > totalRows - 5)) sts = 6;

            let diff = sts - prevSts;
            let note = "";
            if (i > 1) {
                if (diff > 0) note = ` (+${diff} inc)`;
                else if (diff < 0) note = ` (${diff} dec)`;
            }

            log += `Row ${i}: ${sts} sts${note}\n`;
            prevSts = sts;
        }

        document.getElementById('output-log').innerText = log;
    }

    init();
</script>
</body>
</html>
