<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>McKayla's Crochet Lab v3.3.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #fff0f5; }
        #header { background: #ff69b4; color: white; padding: 10px; text-align: center; }
        #version { position: absolute; top: 5px; left: 5px; color: #ff69b4; font-weight: bold; font-size: 12px; }
        #container { display: flex; height: 100vh; }
        #viewer { flex: 1; background: white; }
        #controls { width: 300px; padding: 20px; background: white; border-left: 2px solid #ffc0cb; overflow-y: auto; }
        .box { background: #fff5f8; padding: 10px; margin-bottom: 15px; border-radius: 8px; }
        button { width: 100%; padding: 10px; background: #ff69b4; color: white; border: none; border-radius: 20px; cursor: pointer; }
        #pattern-output { margin-top: 15px; white-space: pre-wrap; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>

<div id="version">v3.3.5</div>

<div id="header">
    <h1>McKayla's Crochet Lab</h1>
</div>

<div id="container">
    <div id="viewer"></div>
    <div id="controls">
        <div class="box">
            <label>Size (cm): <span id="r-text">5</span></label><br>
            <input type="range" id="r-slider" min="1" max="15" value="5" style="width:100%">
        </div>
        <div class="box">
            <label>Color:</label><br>
            <input type="color" id="c-picker" value="#ff69b4" style="width:100%">
        </div>
        <button onclick="runPattern()">Generate Pattern</button>
        <div id="pattern-output">Pattern will appear here.</div>
    </div>
</div>
