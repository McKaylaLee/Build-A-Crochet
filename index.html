<html lang="en">

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #fff0f5; overflow: hidden; }
        #version-tag { position: absolute; top: 10px; left: 10px; background: #ff1493; color: white; padding: 5px 15px; border-radius: 15px; font-size: 12px; z-index: 100; font-weight: bold; }
        #header { background: white; padding: 12px; text-align: center; border-bottom: 4px solid #ff69b4; }
        #header h1 { margin: 0; color: #d02090; font-size: 24px; text-transform: uppercase; }
        #main-container { display: flex; height: calc(100vh - 65px); }
        #viewer { flex: 1; background: #fafafa; border-right: 2px solid #ffc0cb; position: relative; }
        #controls-panel { width: 350px; background: white; padding: 20px; display: flex; flex-direction: column; border-left: 2px solid #ffc0cb; }
        .instruction { font-size: 13px; color: #666; margin-bottom: 15px; background: #fff0f5; padding: 10px; border-radius: 8px; border-left: 4px solid #ff69b4; }
        button { background: #ff1493; color: white; border: none; padding: 15px; border-radius: 30px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: 0.2s; }
        button:hover { background: #ff69b4; }
        #pattern-output { flex: 1; overflow-y: auto; margin-top: 20px; white-space: pre-wrap; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.6; border-top: 1px solid #eee; padding-top: 15px; }
        .stuff-here { color: #ff1493; font-weight: bold; background: #ffe4e1; padding: 2px 6px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="version-tag">🧸 TOUCH & PULL v3.5.1 🧸</div>

<div id="header">
    <h1>✨ Build-A-Crochet ✨</h1>
</div>

<div id="main-container">
    <div id="viewer"></div>
    <div id="controls-panel">
        <div class="instruction">
            🖱️ <b>Click the sphere</b> to see the pull tools.<br>
            ↔️ <b>Drag the arrows</b> to stretch the shape!<br>
            🖱️ <b>Right-Click + Drag</b> to rotate camera.
        </div>
        <button onclick="makePattern()">✨ Update Pattern</button>
        <div id="pattern-output">Stretch the sphere then click update!</div>
    </div>
</div>

<script>
    // 1. Setup Scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xfdfdfd);
    const viewer = document.getElementById('viewer');
    const camera = new THREE.PerspectiveCamera(60, viewer.clientWidth / viewer.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(viewer.clientWidth, viewer.clientHeight);
    viewer.appendChild(renderer.domElement);

    // 2. Add Sphere
    const geometry = new THREE.SphereGeometry(2, 32, 32);
    const material = new THREE.MeshPhongMaterial({ color: 0xff69b4, shininess: 40 });
    const sphere = new THREE.Mesh(geometry, material);
    scene.add(sphere);

    // 3. Add Lights
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 5, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    camera.position.set(0, 2, 12);

    // 4. Transform Controls (The "Pull" Tool)
    const tControls = new THREE.TransformControls(camera, renderer.domElement);
    tControls.setMode("scale"); // Set to "scale" so you can pull/stretch
    tControls.attach(sphere);
    scene.add(tControls);

    });

        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    animate();
