<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v3.5.23</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #fff0f5; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #header { background: white; padding: 10px; text-align: center; border-bottom: 4px solid #ff69b4; }
        #header h1 { margin: 0; color: #d02090; font-size: 22px; }
        
        #main-container { display: flex; flex: 1; overflow: hidden; }

        /* Left side: The Studio */
        #viewer { flex: 1; background: #fafafa; position: relative; display: flex; align-items: center; justify-content: center; touch-action: none; }
        
        /* THE VIEWCUBE (Fixed Version) */
        #cube-panel { position: absolute; top: 15px; left: 15px; background: white; padding: 8px; border: 2px solid #ff69b4; border-radius: 10px; z-index: 100; text-align: center; }
        .cube-btn { background: #ff69b4; color: white; border: none; padding: 5px 10px; margin: 2px; border-radius: 5px; cursor: pointer; font-size: 10px; font-weight: bold; width: 50px; }
        .cube-btn:hover { background: #d02090; }

        #measurements { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: white; padding: 10px 20px; border-radius: 20px; border: 2px solid #ff69b4; color: #d02090; font-weight: bold; display: flex; gap: 20px; z-index: 50; }

        /* Right side: The Pattern */
        #pattern-side { width: 380px; background: white; padding: 20px; border-left: 2px solid #ffc0cb; display: flex; flex-direction: column; }
        #gen-btn { background: #ff1493; color: white; border: none; padding: 18px; border-radius: 35px; font-weight: bold; cursor: pointer; font-size: 18px; box-shadow: 0 4px 0 #b01060; }
        #output { flex: 1; margin-top: 15px; padding: 15px; background: #fff9fb; border: 1px solid #ffc0cb; border-radius: 10px; overflow-y: auto; white-space: pre-wrap; font-family: monospace; font-size: 13px; line-height: 1.4; }

        /* THE 3D SPHERE (Pure CSS) */
        #sphere-space { width: 400px; height: 400px; display: flex; align-items: center; justify-content: center; transition: transform 0.5s; }
        #yarn-ball { 
            width: 150px; height: 150px; 
            background: radial-gradient(circle at 35% 35%, #ffb6c1, #ff69b4 60%, #c71585 100%);
            border-radius: 50%; 
            border: 3px solid #d02090;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            cursor: move;
        }
    </style>
</head>
<body>

<div id="header">
    <h1>✨ Build-A-Crochet ✨</h1>
</div>

<div id="main-container">
    <div id="viewer">
        <div id="cube-panel">
            <div style="font-size: 10px; font-weight: bold; color: #ff1493; margin-bottom: 5px;">VIEW CUBE</div>
            <button class="cube-btn" onclick="rotateTo(-90, 0)">TOP</button><br>
            <button class="cube-btn" onclick="rotateTo(0, 0)">FRONT</button>
            <button class="cube-btn" onclick="rotateTo(0, 90)">SIDE</button><br>
            <button class="cube-btn" onclick="rotateTo(90, 0)">BOT</button>
        </div>

        <div id="measurements">
            <span>W: <span id="w-val">10.0</span>cm</span>
            <span>H: <span id="h-val">10.0</span>cm</span>
        </div>

        <div id="sphere-space">
            <div id="yarn-ball" onmousedown="startDrag(event)"></div>
        </div>
    </div>

    <div id="pattern-side">
        <button id="gen-btn" onclick="generate()">🧶 MAKE PATTERN</button>
        <div id="output">Stretch the ball and click generate!</div>
    </div>
</div>

<script>
    let wCm = 10; let hCm = 10;
    let isDragging = false;
    let startX, startY;
    
    const ball = document.getElementById('yarn-ball');
    const space = document.getElementById('sphere-space');

    // 1. STRETCHING (V3.5.16 Style)
    function startDrag(e) {
        isDragging = true;
        startX = e.clientX;
        startY = e.clientY;
        window.onmousemove = (ev) => {
            if (!isDragging) return;
            const dx = (ev.clientX - startX) * 0.2;
            const dy = (startY - ev.clientY) * 0.2;
            
            wCm = Math.max(5, wCm + dx);
            hCm = Math.max(5, hCm + dy);
            
            ball.style.width = (wCm * 15) + "px";
            ball.style.height = (hCm * 15) + "px";
            
            document.getElementById('w-val').innerText = wCm.toFixed(1);
            document.getElementById('h-val').innerText = hCm.toFixed(1);
            
            startX = ev.clientX;
            startY = ev.clientY;
        };
        window.onmouseup = () => { isDragging = false; };
    }

    // 2. VIEWCUBE (Actually Rotates the sphere)
    function rotateTo(x, y) {
        space.style.transform = `rotateX(${x}deg) rotateY(${y}deg)`;
    }

    // 3. THE PATTERN (Full Middle Part)
    function generate() {
        const w = parseFloat(document.getElementById('w-val').innerText);
        const h = parseFloat(document.getElementById('h-val').innerText);
        const inc = Math.max(3, Math.floor((w/2) * 1.5));
        const mid = Math.max(1, Math.floor(inc * (h/w)));
        
        let p = "<b>🧶 FULL CROCHET STEPS</b>\n";
        p += "Size: " + w + "cm x " + h + "cm\n";
        p += "------------------------------\n";
        p += "R1: Magic Ring 6 [6]\n";
        let sts = 6;
        for (let i = 1; i < inc; i++) {
            sts += 6;
            p += "R" + (i+1) + ": (sc " + i + ", inc) x 6 [" + sts + "]\n";
        }
        
        p += "\n🧶 MIDDLE PART (Keep going!):\n";
        for (let m = 1; m <= mid; m++) {
            p += "R" + (inc + m) + ": sc in each st around [" + sts + "]\n";
        }

        p += "\n🧶 CLOSING UP:\n";
        let r = inc + mid + 1;
        let d = inc - 1;
        while (sts > 6) {
            sts -= 6;
            p += "R" + r + ": (sc " + d + ", dec) x 6 [" + sts + "]\n";
            d--; r++;
            if (sts <= 12) p += "<b>-> STUFF IT NOW! <-</b>\n";
        }
        p += "R" + r + ": dec x 6 [6]\nFinish: Sew closed.";
        
        document.getElementById('output').innerHTML = p;
    }
</script>
</body>
</html>
