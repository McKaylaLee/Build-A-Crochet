<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v3.5.3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #fff0f5; overflow: hidden; }
        #version-tag { position: absolute; top: 10px; left: 10px; background: #ff1493; color: white; padding: 5px 15px; border-radius: 15px; font-size: 12px; z-index: 100; font-weight: bold; }
        #header { background: white; padding: 12px; text-align: center; border-bottom: 4px solid #ff69b4; }
        #header h1 { margin: 0; color: #d02090; font-size: 24px; text-transform: uppercase; }
        #main-container { display: flex; height: calc(100vh - 65px); }
        #viewer { flex: 1; background: #fafafa; border-right: 2px solid #ffc0cb; position: relative; touch-action: none; cursor: s-resize; }
        
        /* The Measurement Label */
        #measurements { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9); padding: 10px 20px; border-radius: 20px;
            border: 2px solid #ff69b4; color: #d02090; font-weight: bold; font-size: 14px;
            pointer-events: none; z-index: 10; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex; gap: 15px;
        }

        #controls-panel { width: 350px; background: white; padding: 20px; display: flex; flex-direction: column; border-left: 2px solid #ffc0cb; }
        .instruction { font-size: 13px; color: #666; margin-bottom: 15px; background: #fff0f5; padding: 10px; border-radius: 8px; border-left: 4px solid #ff69b4; }
        button { background: #ff1493; color: white; border: none; padding: 15px; border-radius: 30px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: 0.2s; }
        button:hover { background: #ff69b4; transform: scale(1.02); }
        #pattern-output { flex: 1; overflow-y: auto; margin-top: 20px; white-space: pre-wrap; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.6; border-top: 1px solid #eee; padding-top: 15px; color: #444; }
        .stuff-here { color: #ff1493; font-weight: bold; background: #ffe4e1; padding: 2px 6px; border-radius: 8px; }
        .size-box { text-align: center; }
        .size-label { font-size: 10px; text-transform: uppercase; color: #ff69b4; display: block; }
    </style>
</head>
<body>

<div id="version-tag">🧸 MEASURE MODE v3.5.3 🧸</div>

<div id="header">
    <h1>✨ Build-A-Crochet ✨</h1>
</div>

<div id="main-container">
    <div id="viewer">
        <div id="measurements">
            <div class="size-box"><span class="size-label">Width</span><span id="m-width">10</span>cm</div>
            <div class="size-box"><span class="size-label">Height</span><span id="m-height">10</span>cm</div>
            <div class="size-box"><span class="size-label">Depth</span><span id="m-depth">10</span>cm</div>
        </div>
    </div>
    <div id="controls-panel">
        <div class="instruction">
            ⬆️ <b>Drag Up/Down</b>: Change Height<br>
            ⬅️ <b>Drag Left/Right</b>: Change Width & Depth
        </div>
        <button onclick="makePattern()">✨ Generate Pattern</button>
        <div id="pattern-output">Stretch the sphere to see the sizes change!</div>
    </div>
</div>

<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xfdfdfd);
    const viewer = document.getElementById('viewer');
    const camera = new THREE.PerspectiveCamera(50, viewer.clientWidth / viewer.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(viewer.clientWidth, viewer.clientHeight);
    viewer.appendChild(renderer.domElement);

    const geometry = new THREE.SphereGeometry(2, 32, 32);
    const material = new THREE.MeshPhongMaterial({ color: 0xff69b4, shininess: 40 });
    const sphere = new THREE.Mesh(geometry, material);
    scene.add(sphere);

    const wire = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({ color: 0xff1493, wireframe: true, transparent: true, opacity: 0.1 }));
    sphere.add(wire);

    scene.add(new THREE.DirectionalLight(0xffffff, 1.2).set(5, 10, 7));
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));

    camera.position.z = 15;

    // Measurement Display Elements
    const dispH = document.getElementById('m-height');
    const dispW = document.getElementById('m-width');
    const dispD = document.getElementById('m-depth');

    let isDragging = false;
    let lastY = 0, lastX = 0;

    viewer.onmousedown = (e) => { isDragging = true; lastY = e.clientY; lastX = e.clientX; };
    window.onmouseup = () => { isDragging = false; };
    
    window.onmousemove = (e) => {
        if (!isDragging) return;

        const dY = (lastY - e.clientY) * 0.015;
        const dX = (e.clientX - lastX) * 0.015;

        sphere.scale.y = Math.max(0.2, sphere.scale.y + dY);
        sphere.scale.x = Math.max(0.2, sphere.scale.x + dX);
        sphere.scale.z = Math.max(0.2, sphere.scale.z + dX);

        // Update CM displays (assuming 2 units = 5cm base radius, so 4 units = 10cm)
        // Scale 1 = 10cm
        dispH.innerText = (sphere.scale.y * 10).toFixed(1);
        dispW.innerText = (sphere.scale.x * 10).toFixed(1);
        dispD.innerText = (sphere.scale.z * 10).toFixed(1);

        lastY = e.clientY; lastX = e.clientX;
    };

    function animate() {
        requestAnimationFrame(animate);
        if(!isDragging) sphere.rotation.y += 0.005;
        renderer.render(scene, camera);
    }
    animate();

    function makePattern() {
        const h = sphere.scale.y * 10;
        const w = sphere.scale.x * 10;
        const radius = w / 2;
        const incRounds = Math.max(3, Math.floor(radius * 1.5));
        const middleRows = Math.max(2, Math.floor(incRounds * 0.8 * (h/w)));

        let output = "<b>🧶 BUILD-A-CROCHET DATA</b>\n";
        output += "Final Size: " + w.toFixed(1) + "cm x " + h.toFixed(1) + "cm\n";
        output += "---------------------------\n";
        output += "R1: Magic Ring 6\n";
        output += "R2: (inc) x 6\n";
        
        let sts = 12;
        let roundCount = 2;
        for (let i = 1; i < incRounds; i++) {
            sts += 6; roundCount++;
            output += "R" + roundCount + ": (sc " + i + ", inc) x 6 [" + sts + "]\n";
        }
        
        output += "\n✨ MIDDLE (" + middleRows + " rows)\n";
        for (let m = 1; m <= middleRows; m++) {
            roundCount++;
            output += "R" + roundCount + ": sc in each stitch [" + sts + "]\n";
        }
        
        output += "\n✨ DECREASES\n";
        for (let k = incRounds - 1; k >= 1; k--) {
            sts -= 6; roundCount++;
            output += "R" + roundCount + ": (sc " + k + ", dec) x 6 [" + sts + "]";
            if (k === 1) output += " <span class='stuff-here'>Stuff here</span>";
            output += "\n";
        }
        roundCount++;
        output += "R" + roundCount + ": (dec) x 6\n\nFinish: Sew closed!";
        
        document.getElementById('pattern-output').innerHTML = output;
    }
</script>
</body>
</html>
