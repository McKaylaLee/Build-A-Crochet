<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McKayla's Crochet Lab v3.3.3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* Version Info Style */
        #version-tag { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5); color: white; padding: 5px 10px; border-radius: 15px; font-size: 12px; z-index: 100; }
        
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #fff0f5; color: #333; }
        #header { background: #ff69b4; color: white; padding: 20px; text-align: center; position: relative; }
        #main { display: flex; flex-direction: row; height: calc(100vh - 90px); }
        #viewer { flex: 1; background: #ffffff; }
        #controls { width: 380px; background: white; padding: 20px; border-left: 2px solid #ffc0cb; overflow-y: auto; }
        .input-group { margin-bottom: 20px; background: #fff5f8; padding: 15px; border-radius: 10px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #d02090; }
        input[type=range] { width: 100%; accent-color: #ff69b4; }
        button { background: #ff69b4; color: white; border: none; padding: 15px; width: 100%; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:hover { background: #ff1493; }
        #pattern-output { margin-top: 20px; white-space: pre-wrap; background: #fafafa; padding: 15px; border-radius: 10px; border: 1px dashed #ff69b4; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.5; }
    </style>
</head>
<body>

<div id="version-tag">Version 3.3.3 (Web)</div>

<div id="header">
    <h1>🧶 McKayla's Crochet Lab </h1>
    <p>Lead Developer: Elliot | Creative Director: McKayla</p>
</div>

<div id="main">
    <div id="viewer"></div>
    <div id="controls">
        <div class="input-group">
            <label>Sphere Size: <span id="radius-val">5</span> cm</label>
            <input type="range" id="radius-slider" min="1" max="15" value="5" step="0.5">
        </div>
        <div class="input-group">
            <label>Yarn Color:</label>
            <input type="color" id="color-picker" value="#ff69b4">
        </div>
        <button onclick="generatePattern()">✨ Generate Pattern</button>
        <div id="pattern-output">Click the button to generate...</div>
    </div>
</div>

<script>
    // 3D Scene Setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xfdfdfd);
    const viewer = document.getElementById('viewer');
    const camera = new THREE.PerspectiveCamera(75, viewer.clientWidth / viewer.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(viewer.clientWidth, viewer.clientHeight);
    viewer.appendChild(renderer.domElement);

    const geometry = new THREE.SphereGeometry(1, 32, 32);
    const material = new THREE.MeshPhongMaterial({ color: 0xff69b4, shininess: 80 });
    const sphere = new THREE.Mesh(geometry, material);
    scene.add(sphere);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 5, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040, 1.5));
    camera.position.z = 5;

    function animate() {
        requestAnimationFrame(animate);
        sphere.rotation.y += 0.005;
        renderer.render(scene, camera);
    }
    animate();

    // Interaction Logic
    const slider = document.getElementById('radius-slider');
    const radiusVal = document.getElementById('radius-val');
    const colorPicker = document.getElementById('color-picker');

    slider.oninput = function() {
        const r = parseFloat(this.value);
        radiusVal.innerText = r;
        sphere.scale.set(r/5, r/5, r/5);
    };

    colorPicker.oninput = function() {
        sphere.material.color.set(this.value);
    };

    function generatePattern() {
        const r = parseFloat(slider.value);
        const stitchGauge = 2.5; // Stitches per cm
        const rowGauge = 2.0;
