<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v3.5.15</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #fff0f5; color: #333; }
        #header { background: white; padding: 15px; text-align: center; border-bottom: 4px solid #ff69b4; }
        #header h1 { margin: 0; color: #d02090; font-size: 24px; }
        
        #main-container { display: flex; flex-direction: row; height: 90vh; }
        
        /* Left Side: The Designer */
        #design-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; border-right: 2px solid #ffc0cb; padding: 20px; }
        
        /* The Pink Sphere (Simple Box) */
        #yarn-ball { 
            background: #ff69b4; 
            border: 4px solid #d02090; 
            border-radius: 50%; 
            width: 150px; 
            height: 150px;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.1);
            transition: 0.2s;
        }

        /* Sliders */
        .slider-box { width: 80%; margin: 20px 0; text-align: center; }
        input[type=range] { width: 100%; cursor: pointer; }
        .label-text { font-weight: bold; color: #d02090; margin-bottom: 5px; display: block; }

        /* Right Side: The Pattern */
        #pattern-area { width: 350px; padding: 20px; background: #fff9fb; overflow-y: auto; }
        button { background: #d02090; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        #pattern-text { white-space: pre-wrap; font-family: monospace; background: white; padding: 10px; border: 1px solid #ffc0cb; border-radius: 5px; }
    </style>
</head>
<body>

<div id="header">
    <h1>✨ Build-A-Crochet v3.5.15 ✨</h1>
</div>

<div id="main-container">
    <div id="design-area">
        <div id="yarn-ball"></div>

        <div class="slider-box">
            <span class="label-text">WIDTH & LENGTH: <span id="w-val">10</span>cm</span>
            <input type="range" id="widthSlider" min="5" max="25" value="10" oninput="update()">
        </div>

        <div class="slider-box">
            <span class="label-text">HEIGHT: <span id="h-val">10</span>cm</span>
            <input type="range" id="heightSlider" min="5" max="25" value="10" oninput="update()">
        </div>
    </div>

    <div id="pattern-area">
        <button onclick="generate()">🧶 MAKE PATTERN</button>
        <div id="pattern-text">Adjust sliders and click the button!</div>
    </div>
</div>
