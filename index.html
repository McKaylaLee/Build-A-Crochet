<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v3.5.17</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #fff0f5; overflow: hidden; }
        #version-tag { position: absolute; top: 10px; right: 400px; background: #ff1493; color: white; padding: 5px 15px; border-radius: 15px; font-size: 12px; z-index: 100; font-weight: bold; }
        
        #header { background: white; padding: 12px; text-align: center; border-bottom: 4px solid #ff69b4; z-index: 10; position: relative; }
        #header h1 { margin: 0; color: #d02090; font-size: 24px; text-transform: uppercase; }

        #main-container { display: flex; height: calc(100vh - 65px); width: 100vw; }

        /* Left Side: 3D Scene */
        #viewer { flex: 1; background: #eeeeee; position: relative; }
        
        /* ViewCube Style (Tinkercad Style) */
        #view-cube-container {
            position: absolute; top: 20px; left: 20px;
            width: 100px; height: 100px; z-index: 100;
            perspective: 400px;
        }
        #view-cube {
            width: 60px; height: 60px; position: relative;
            transform-style: preserve-3d; transform: rotateX(-20deg) rotateY(-20deg);
            transition: transform 0.5s; cursor: grab; margin: 20px;
        }
        .cube-face {
            position: absolute; width: 60px; height: 60px;
            background: rgba(255, 255, 255, 0.9); border: 2px solid #ff69b4;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; color: #d02090;
            backface-visibility: visible; user-select: none;
        }
        .front  { transform: translateZ(30px); }
        .back   { transform: rotateY(180deg) translateZ(30px); }
        .top    { transform: rotateX(90deg) translateZ(30px); }
        .bottom { transform: rotateX(-90deg) translateZ(30px); }
        .right  { transform: rotateY(90deg) translateZ(30px); }
        .left   { transform: rotateY(-90deg) translateZ(30px); }

        /* Right Side: Pattern */
        #controls-panel { width: 380px; background: white; padding: 20px; border-left: 4px solid #ffc0cb; z-index: 20; display: flex; flex-direction: column; }
        
        #measurements { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: white; padding: 8px 20px; border-radius: 20px;
            border: 2px solid #ff69b4; color: #d02090; font-weight: bold; display: flex; gap: 15px; z-index: 30;
        }

        .mode-toggle { background: #eee; padding: 10px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        button { background: #ff1493; color: white; border: none; padding: 15px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        #pattern-output { flex: 1; overflow-y: auto; margin-top: 20px; background: #fff9fb; border: 1px solid #ffc0cb; padding: 15px; font-family: monospace; border-radius: 10px; }
    </style>
</head>

    <h1>✨ Build-A-Crochet ✨</h1>
</div>
