<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Build-A-Crochet PRO v4.4.0</title>
    <style>
        body { margin: 0; font-family: sans-serif; overflow: hidden; background: #ffffff; color: #333; touch-action: none; }
        
        /* Slim Top Bar */
        #top-bar { 
            position: absolute; top: 0; left: 0; width: 100%; height: 65px;
            background: rgba(255, 255, 255, 0.9); display: flex; align-items: center; 
            justify-content: space-around; padding: 0 5px; box-sizing: border-box;
            border-bottom: 1.5px solid #ff69b4; z-index: 200;
        }
        
        .item { display: flex; flex-direction: column; align-items: center; scale: 0.9; }
        label { font-size: 9px; color: #ff69b4; font-weight: bold; margin-bottom: 1px; letter-spacing: -0.5px; }
        select, input { background: #fff; border: 1px solid #ddd; color: #333; border-radius: 3px; padding: 2px 4px; font-size: 11px; }
        
        .btn-s { background: #f5f5f5; border: 1px solid #ccc; padding: 2px 6px; margin: 0 1px; border-radius: 3px; font-size: 10px; font-weight: bold; cursor: pointer; }
        
        #canvas-container { width: 100vw; height: 100vh; }
        
        button#gen-btn { 
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: #ff69b4; color: white; border: none; padding: 12px 25px; 
            border-radius: 25px; font-weight: bold; cursor: pointer; z-index: 150;
            font-size: 13px; box-shadow: 0 4px 12px rgba(255, 105, 180, 0.3);
        }
        #v-info { position: absolute; bottom: 8px; right: 10px; font-size: 9px; color: #ddd; pointer-events: none; }
    </style>
</head>
