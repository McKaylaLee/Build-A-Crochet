<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v3.5.14</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #fff0f5; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #header { background: white; padding: 15px; text-align: center; border-bottom: 4px solid #ff69b4; z-index: 10; }
        #header h1 { margin: 0; color: #d02090; font-size: 24px; text-transform: uppercase; }
        #version-tag { position: absolute; top: 10px; left: 10px; background: #ff1493; color: white; padding: 5px 15px; border-radius: 15px; font-size: 11px; font-weight: bold; }
        
        #main-container { display: flex; flex: 1; }
        
        /* The Canvas Area - SVG is bulletproof */
        #viewer { flex: 1; background: #fdfdfd; border-right: 2px solid #ffc0cb; display: flex; align-items: center; justify-content: center; position: relative; touch-action: none; }
        
        #controls-panel { width: 380px; background: white; padding: 25px; display: flex; flex-direction: column; border-left: 2px solid #ffc0cb; overflow-y: auto; }
        
        button { background: #ff1493; color: white; border: none; padding: 18px; border-radius: 35px; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; box-shadow: 0 4px 0 #b01060; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #b01060; }

        #pattern-box { margin-top: 20px; padding: 15px; background: #fff9fb; border: 1px solid #ffc0cb; border-radius: 10px; font-family: 'Courier New', monospace; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
        
        /* The Yarn Sphere Styles */
        .yarn-ball { fill: #ff69b4; stroke: #d02090; stroke-width: 4; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); }
        .measure-text { font-weight: bold; font-size: 16px; fill: #d02090; font-family: sans-serif; pointer-events: none; }
        .handle { cursor: pointer; fill: white; stroke: #ff1493; stroke-width: 3; }
    </style>
</head>
<body>

<div id="version-tag">🧸 v3.5.14 🧸</div>

<div id="header">
    <h1>✨ Build-A-Crochet ✨</h1>
</div>

<div id="main-container">
    <div id="viewer">
