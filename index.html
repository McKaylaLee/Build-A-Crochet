<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v3.5.43</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #fff0f5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #header { background: white; padding: 10px; text-align: center; border-bottom: 4px solid #ff69b4; }
        
        #app-area { display: flex; flex: 1; }

        /* Left Side: The Ball View */
        #viewer { flex: 1; background: #ffffff; position: relative; display: flex; align-items: center; justify-content: center; }
        
        /* The View Remote (Buttons) */
        #remote { position: absolute; top: 20px; left: 20px; background: white; border: 3px solid #ff69b4; padding: 12px; border-radius: 10px; z-index: 100; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .view-btn { background: #ff69b4; color: white; border: none; padding: 10px; margin: 4px; border-radius: 5px; cursor: pointer; font-size: 11px; width: 75px; font-weight: bold; display: block; }
        .view-btn:hover { background: #ff1493; }

        #measurements { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: white; padding: 10px 20px; border-radius: 20px; border: 2px solid #ff69b4; color: #d02090; font-weight: bold; display: flex; gap: 20px; z-index: 100; }

        /* THE 3D BALL */
        #yarn-ball { 
            width: 150px; height: 150px; 
            /* Start with Front Lighting */
            background: radial-gradient(circle at 35% 35%, #ffb6c1, #ff69b4 50%, #8b1050 100%);
            border-radius: 50%; 
            border: 3px solid #d02090;
            cursor: move;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            user-select: none;
            transition: background 0.4s ease; /* Makes the "turn" look smooth */
        }

        /* Right Side: Pattern */
        #panel { width: 350px; background: white; border-left: 2px solid #ffc0cb; padding: 20px; display: flex; flex-direction: column; }
        #make-btn { background: #ff1493; color: white; border: none; padding: 15px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 18px; box-shadow: 0 4px 0 #b01060; margin-bottom: 15px; }
        #output { flex: 1; background: #fff9fb; border: 1px solid #ffc0cb; border-radius: 10px; padding: 15px; overflow-y: auto; white-space: pre-wrap; font-family: monospace; font-size: 13px; color: #333; }
    </style>
</head>
<body>

<div id="header">
    <h1 style="margin:0; color:#d02090;">✨ Build-A-Crochet v3.5.43 ✨</h1>
</div>

<div id="app-area">
    <div id="viewer">
        <div id="remote">
            <div style="font-size: 10px; color: #ff1493; margin-bottom: 8px; font-weight: bold;">VIEW REMOTE</div>
            <button class="view-btn" onclick="changeView('50% 15%', 'TOP')">TOP</button>
            <button class="view-btn" onclick="changeView('35% 35%', 'FRONT')">FRONT</button>
            <button class="view-btn" onclick="changeView('75% 50%', 'SIDE')">SIDE</button>
            <button class="view-btn" onclick="changeView('50% 85%', 'BOTTOM')">BOTTOM</button>
        </div>

        <div id="measurements">
            <span>W: <span id="w-txt">10.0</span>cm</span>
            <span>H: <span id="h-txt">10.0</span>cm</span>
        </div>

        <div id="yarn-ball" onmousedown="startStretch(event)"></div>
    </div>

    <div id="panel">
        <button id="make-btn" onclick="generate()">🧶 MAKE PATTERN</button>
        <div id="output">Grab the ball to stretch it!\nClick Remote to rotate the 3D view!</div>
    </div>
</div>
