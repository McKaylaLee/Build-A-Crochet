<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Build-A-Crochet PRO v4.4.3</title>
    <style>
        body { margin: 0; font-family: sans-serif; overflow: hidden; background: #ffffff; color: #333; touch-action: none; }
        
        /* v4.3.9 구조 유지 + 너비 미세 조정 */
        #top-bar { 
            position: absolute; top: 0; left: 0; width: 100%; height: 80px;
            background: rgba(255, 255, 255, 0.9); display: flex; align-items: center; 
            justify-content: space-around; padding: 0 5px; box-sizing: border-box;
            border-bottom: 2px solid #ff69b4; z-index: 200;
        }
        
        .item { display: flex; flex-direction: column; align-items: center; }
        label { font-size: 9px; color: #ff69b4; font-weight: bold; margin-bottom: 2px; }
        
        /* 너비를 좁혀서 가로 공간 확보 */
        select { background: #fff; border: 1px solid #ccc; color: #333; border-radius: 4px; padding: 4px; font-size: 11px; width: 80px; }
        input { background: #fff; border: 1px solid #ccc; color: #333; border-radius: 4px; padding: 4px; font-size: 12px; width: 35px; text-align: center; }
        
        /* 버튼 크기를 살짝 줄여서 한 줄 배치 유도 */
        .btn-s { background: #eee; border: 1px solid #ccc; padding: 2px 6px; margin: 0 1px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; }
        
        #canvas-container { width: 100vw; height: 100vh; }
        
        button#gen-btn { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #ff69b4; color: white; border: none; padding: 15px 30px; 
            border-radius: 30px; font-weight: bold; cursor: pointer; z-index: 150;
        }
        #v-info { position: absolute; bottom: 10px; right: 10px; font-size: 9px; color: #ccc; pointer-events: none; }
    </style>
</head>
<body>

<div id="top-bar">
    <div class="item">
        <label>YARN</label>
        <select id="yarn-selector">
            <option value="0">0: Lace</option><option value="1">1: Super Fine</option>
            <option value="2">2: Fine</option><option value="3">3: Light</option>
            <option value="4" selected>4: Worsted</option><option value="5">5: Bulky</option>
            <option value="6">6: Super Bulky</option><option value="7">7: Jumbo</option>
        </select>
    </div>
    <div class="item">
        <label>WIDTH(cm)</label>
        <div style="display: flex; align-items: center; white-space: nowrap;">
            <button class="btn-s" onclick="document.getElementById('in-w').value=(parseFloat(document.getElementById('in-w').value)-0.5).toFixed(1)">-</button>
            <input type="number" id="in-w" value="13.5" readonly>
            <button class="btn-s" onclick="document.getElementById('in-w').value=(parseFloat(document.getElementById('in-w').value)+0.5).toFixed(1)">+</button>
        </div>
    </div>
    <div class="item">
        <label>HEIGHT(cm)</label>
        <div style="display: flex; align-items: center; white-space: nowrap;">
            <button class="btn-s" onclick="document.getElementById('in-h').value=(parseFloat(document.getElementById('in-h').value)-0.5).toFixed(1)">-</button>
            <input type="number" id="in-h" value="26.0" readonly>
            <button class="btn-s" onclick="document.getElementById('in-h').value=(parseFloat(document.getElementById('in-h').value)+0.5).toFixed(1)">+</button>
        </div>
    </div>
</div>

<button id="gen-btn" onclick="generatePattern()">GENERATE PATTERN</button>
<div id="v-info">Build-A-Crochet PRO v4.4.3</div>
<div id="canvas-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
