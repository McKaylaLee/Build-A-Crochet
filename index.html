<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v5.34.0 - Tool Modes</title>
    <style>
        body { margin: 0; background-color: #ffffff; color: #111; overflow: hidden; display: flex; font-family: monospace; touch-action: none; user-select: none; }
        #panel { width: 92px; height: 100vh; background: #f0f0f0; border-right: 1px solid #ccc; display: flex; flex-direction: column; align-items: center; padding-top: 16px; gap: 8px; z-index: 1000; position: absolute; left: 0; top: 0; overflow-y: auto; }
        .btn { width: 56px; min-height: 50px; cursor: pointer; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 10px; border-radius: 8px; background: #ddd; text-align: center; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); padding: 4px; }
        .tool-label { font-size: 9px; line-height: 1.1; }
        .tool-icon { font-size: 18px; line-height: 1; margin-bottom: 2px; }
        .tool-btn { flex-direction: column; }
        .tool-btn.active { background: #ff69b4; color: #fff; border-color: #ff9ccc; }
        .tool-divider { width: 64px; height: 1px; background: #cfcfcf; margin: 2px 0; }
        .shape-btn { width: 56px; min-height: 44px; font-size: 9px; line-height: 1.1; }
        .shape-btn.active { background: #28a745; color: #fff; border-color: #7ad58d; }
        .history-btn { background: #333; color: white; }
        #v-tag { position: absolute; bottom: 20px; right: 20px; color: #444; font-size: 12px; font-weight: bold; pointer-events: none; z-index: 50; background: rgba(255,255,255,0.8); padding: 4px; border-radius: 4px; }
        #palette { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.9); padding: 10px; border-radius: 12px; display: none; grid-template-columns: repeat(2, 1fr); gap: 5px; border: 1px solid #ccc; z-index: 200; }
        .color-dot { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
        #select-box { border: 2px dashed #ff69b4; background: rgba(255, 105, 180, 0.05); position: absolute; pointer-events: none; display: none; z-index: 10; }
    </style>
</head>
<body>

<div id="panel">
    <div class="btn tool-btn active" id="pointer-tool-btn" onclick="setToolMode('pointer')">
        <div class="tool-icon">↖</div>
        <div class="tool-label">POINTER</div>
    </div>
    <div class="btn tool-btn" id="rotate-tool-btn" onclick="setToolMode('rotate')">
        <div class="tool-icon">↻</div>
        <div class="tool-label">ROTATE</div>
    </div>
    <div class="btn tool-btn" id="scale-tool-btn" onclick="setToolMode('scale')">
        <div class="tool-icon">⤢</div>
        <div class="tool-label">SIZE</div>
    </div>
    <div class="btn tool-btn" id="stretch-tool-btn" onclick="setToolMode('stretch')">
        <div class="tool-icon">⇱</div>
        <div class="tool-label">STRETCH</div>
    </div>

    <div class="tool-divider"></div>

    <div class="btn history-btn" onclick="executeUndo()">UNDO</div>
    <div class="btn history-btn" onclick="executeRedo()">REDO</div>

    <div class="btn shape-btn active" id="egg-shape-btn" onclick="setPlacementShape('egg')">OVAL</div>
    <div class="btn shape-btn" id="paraboloid-shape-btn" onclick="setPlacementShape('paraboloid')">PARA</div>
    <div class="btn shape-btn" id="spawn-btn" onclick="togglePlacementMode()">PLACE</div>
</div>

<div id="v-tag">Build-A-Crochet v5.34.0</div>
<div id="select-box"></div>
<div id="palette">
    <div class="color-dot" style="background: #ff69b4;" onclick="updateColor('#ff69b4')"></div>
    <div class="color-dot" style="background: #ffffff;" onclick="updateColor('#ffffff')"></div>
    <div class="color-dot" style="background: #000000;" onclick="updateColor('#000000')"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, ghostShape;
    let isPlacementMode = false, dragTarget = null, isDragging = false;
    let groupHandles = [], stretchHandles = [], groupRotHandles = [], groupGizmo;
    let startHandleDist = 1;
    let history = [], historyIndex = -1;
    let currentSelection = [], isBoxSelecting = false, boxStart = new THREE.Vector2();
    let startGroupData = [], startMouseAngle = 0;
    let dragStartPoint = null, startPositions = [];
    let currentTool = 'pointer';
    let deformSession = null;
    let placementShape = 'egg';

    const BASE_H = 96, BASE_R = 36;
    const STRETCH_RADIUS = 44;
    const tmpVec = new THREE.Vector3();
    const tmpVec2 = new THREE.Vector3();
    const tmpVec3 = new THREE.Vector3();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(260, 220, 260);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());

        const grid = new THREE.GridHelper(1000, 50, 0x666666, 0xcccccc);
        grid.position.y = -0.2;
        scene.add(grid);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(100, 200, 100);
        scene.add(dirLight);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: null };
        controls.target.set(0, BASE_H * 0.5, 0);
        controls.update();

        createGroupGizmo();
        createGhost();
        setToolMode('pointer');
        setPlacementShape('egg');

        window.addEventListener('pointerdown', onDown);
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        window.addEventListener('keydown', onKey);
        window.addEventListener('resize', onResize);

        captureState();
        animate();
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function onKey(e) {
        if (e.key === "Delete" || e.key === "Backspace") {
            const targets = [...currentSelection];
            if (targets.length > 0) {
                targets.forEach(o => {
                    o.geometry.dispose();
                    o.userData.outline.geometry.dispose();
                    o.material.dispose();
                    o.userData.outline.material.dispose();
                    scene.remove(o);
                });
                updateSelectionVisuals([]);
                captureState();
            }
        }
    }

    function createProfile(shapeType) {
        const points = [];
        for (let i = 0; i <= 24; i++) {
            const t = i / 24;
            const y = t * BASE_H;
            let r;
            if (shapeType === 'paraboloid') {
                r = BASE_R * Math.pow(t, 0.65);
            } else {
                r = BASE_R * Math.sqrt(Math.max(0, 1 - Math.pow((y - BASE_H / 2) / (BASE_H / 2), 2)));
            }
            points.push(new THREE.Vector2(Math.max(0.1, r), y));
        }
        return points;
    }

    function createShapeMesh(shapeType, color, isGhost = false) {
        const points = createProfile(shapeType);
        const geo = new THREE.LatheGeometry(points, 32);
        geo.translate(0, -BASE_H / 2, 0);
        geo.userData.origPos = geo.attributes.position.clone();
        geo.userData.deformOffsets = new Float32Array(geo.attributes.position.count * 3);

        const mat = new THREE.MeshPhongMaterial({ color, wireframe: true, transparent: true, opacity: isGhost ? 0.3 : 0.8 });
        const mesh = new THREE.Mesh(geo, mat);

        if (!isGhost) {
            mesh.userData.isEgg = true;
            mesh.userData.shapeType = shapeType;
            mesh.userData.data = { scale: new THREE.Vector3(1, 1, 1) };

            const outline = new THREE.Mesh(
                geo.clone(),
                new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.BackSide })
            );
            outline.scale.set(1.02, 1.02, 1.02);
            mesh.add(outline);
            mesh.userData.outline = outline;
        }

        return mesh;
    }

    function updateMesh(mesh) {
        if (!mesh) return;

        const pos = mesh.geometry.attributes.position;
        const orig = mesh.geometry.userData.origPos;
        const offsets = mesh.geometry.userData.deformOffsets;
        const scale = mesh.userData.data.scale;

        for (let i = 0; i < orig.count; i++) {
            const idx = i * 3;
            pos.setXYZ(
                i,
                orig.getX(i) * scale.x + offsets[idx],
                orig.getY(i) * scale.y + offsets[idx + 1],
                orig.getZ(i) * scale.z + offsets[idx + 2]
            );
        }

        pos.needsUpdate = true;
        mesh.geometry.computeBoundingBox();
        mesh.geometry.computeBoundingSphere();
        mesh.geometry.computeVertexNormals();

        const outlinePos = mesh.userData.outline.geometry.attributes.position;
        outlinePos.copy(pos);
        outlinePos.needsUpdate = true;
        mesh.userData.outline.geometry.computeBoundingBox();
        mesh.userData.outline.geometry.computeBoundingSphere();
        mesh.userData.outline.geometry.computeVertexNormals();
    }

    function createHandle(color, userData) {
        const handle = new THREE.Mesh(
            new THREE.SphereGeometry(2.7, 16, 16),
            new THREE.MeshBasicMaterial({ color, depthTest: false })
        );
        handle.renderOrder = 999;
        handle.visible = false;
        handle.userData = userData;
        scene.add(handle);
        return handle;
    }

    function createGroupGizmo() {
        groupGizmo = new THREE.BoxHelper(new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1)), 0xff69b4);
        groupGizmo.visible = false;
        scene.add(groupGizmo);

        for (let i = 0; i < 10; i++) {
            groupHandles.push(createHandle(0xffd84d, { isGroupHandle: true, id: i }));
            stretchHandles.push(createHandle(0xffd84d, { isStretchHandle: true, id: i, worldDirection: new THREE.Vector3() }));
        }

        const makeR = (col, axis) => {
            const r = new THREE.Mesh(
                new THREE.TorusGeometry(38, 0.8, 16, 64),
                new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.6, depthTest: false })
            );
            r.renderOrder = 998;
            r.visible = false;
            r.userData = { isGroupRotationHandle: true, axis };
            scene.add(r);
            return r;
        };

        groupRotHandles = [makeR(0xff0000, 'x'), makeR(0x00ff00, 'y'), makeR(0x0000ff, 'z')];
    }

    function setToolMode(mode) {
        currentTool = mode;
        document.getElementById('pointer-tool-btn').classList.toggle('active', mode === 'pointer');
        document.getElementById('rotate-tool-btn').classList.toggle('active', mode === 'rotate');
        document.getElementById('scale-tool-btn').classList.toggle('active', mode === 'scale');
        document.getElementById('stretch-tool-btn').classList.toggle('active', mode === 'stretch');
        updateSelectionVisuals(currentSelection);
    }

    function setPlacementShape(shapeType) {
        placementShape = shapeType;
        document.getElementById('egg-shape-btn').classList.toggle('active', shapeType === 'egg');
        document.getElementById('paraboloid-shape-btn').classList.toggle('active', shapeType === 'paraboloid');
        if (ghostShape) {
            scene.remove(ghostShape);
            ghostShape.geometry.dispose();
            ghostShape.material.dispose();
        }
        createGhost();
        if (isPlacementMode) {
            ghostShape.visible = true;
        }
    }

    function updateSelectionVisuals(selected) {
        scene.children.filter(o => o.userData.isEgg).forEach(e => e.userData.outline.scale.set(1.02, 1.02, 1.02));
        groupHandles.forEach(h => h.visible = false);
        stretchHandles.forEach(h => h.visible = false);
        groupRotHandles.forEach(h => h.visible = false);
        groupGizmo.visible = false;
        document.getElementById('palette').style.display = 'none';

        currentSelection = selected;
        if (selected.length === 0) return;

        selected.forEach(e => e.userData.outline.scale.set(1.1, 1.1, 1.1));
        document.getElementById('palette').style.display = 'grid';

        if (currentTool === 'scale' || currentTool === 'stretch' || currentTool === 'rotate') groupGizmo.visible = true;
        if (currentTool === 'scale') groupHandles.forEach(h => h.visible = true);
        if (currentTool === 'stretch') stretchHandles.forEach(h => h.visible = true);
        if (currentTool === 'rotate') groupRotHandles.forEach(h => h.visible = true);
        updateGroupGizmoVisuals();
    }

    function updateGroupGizmoVisuals() {
        if (currentSelection.length === 0) return;

        const box = new THREE.Box3();
        currentSelection.forEach(e => {
            e.geometry.computeBoundingBox();
            box.union(e.geometry.boundingBox.clone().applyMatrix4(e.matrixWorld));
        });

        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const helperBox = new THREE.Mesh(new THREE.BoxGeometry(size.x, size.y, size.z));
        helperBox.position.copy(center);
        groupGizmo.update(helperBox);

        const handlePoints = [
            new THREE.Vector3(-0.5, 0.5, 0.5),
            new THREE.Vector3(-0.5, 0.5, -0.5),
            new THREE.Vector3(-0.5, -0.5, 0.5),
            new THREE.Vector3(-0.5, -0.5, -0.5),
            new THREE.Vector3(0.5, 0.5, 0.5),
            new THREE.Vector3(0.5, 0.5, -0.5),
            new THREE.Vector3(0.5, -0.5, 0.5),
            new THREE.Vector3(0.5, -0.5, -0.5),
            new THREE.Vector3(0, 0.5, 0),
            new THREE.Vector3(0, -0.5, 0)
        ];

        groupHandles.forEach((h, i) => {
            h.position.copy(center).add(handlePoints[i].clone().multiply(size));
        });

        stretchHandles.forEach((h, i) => {
            const offset = handlePoints[i].clone().multiply(size);
            const worldDirection = offset.lengthSq() === 0 ? new THREE.Vector3(0, 1, 0) : offset.clone().normalize();
            h.position.copy(center).add(offset);
            h.userData.worldDirection.copy(worldDirection);
        });

        groupRotHandles.forEach((r, i) => {
            r.position.copy(center);
            r.rotation.set(0, 0, 0);
            const s = Math.max(size.x, size.y, size.z) * 0.8 + 10;
            r.scale.set(s / 38, s / 38, s / 38);
            if (i === 0) r.rotateY(Math.PI / 2);
            if (i === 1) r.rotateX(Math.PI / 2);
        });
    }

    function getPointerRay(e) {
        const mouse = new THREE.Vector2(
            (e.clientX / window.innerWidth) * 2 - 1,
            -(e.clientY / window.innerHeight) * 2 + 1
        );
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);
        return raycaster;
    }

    function applyStretch(object, session, amount) {
        const offsets = object.geometry.userData.deformOffsets;
        offsets.set(session.baseOffsets);

        const orig = object.geometry.userData.origPos;
        const localDir = session.localDirection;
        const localAnchor = session.localAnchor;

        for (let i = 0; i < orig.count; i++) {
            const idx = i * 3;
            const vertex = tmpVec.set(
                orig.getX(i) * object.userData.data.scale.x + session.baseOffsets[idx],
                orig.getY(i) * object.userData.data.scale.y + session.baseOffsets[idx + 1],
                orig.getZ(i) * object.userData.data.scale.z + session.baseOffsets[idx + 2]
            );

            const toVertex = tmpVec2.copy(vertex).sub(localAnchor);
            const along = toVertex.dot(localDir);
            if (along < -6) continue;

            const radialVec = tmpVec3.copy(toVertex).sub(localDir.clone().multiplyScalar(along));
            const radial = radialVec.length();
            if (radial > STRETCH_RADIUS) continue;

            const radialFalloff = 1 - radial / STRETCH_RADIUS;
            const alongFalloff = Math.max(0, Math.min(1, (along + 10) / 34));
            const push = amount * radialFalloff * radialFalloff * alongFalloff;

            offsets[idx] = session.baseOffsets[idx] + localDir.x * push;
            offsets[idx + 1] = session.baseOffsets[idx + 1] + localDir.y * push;
            offsets[idx + 2] = session.baseOffsets[idx + 2] + localDir.z * push;
        }

        updateMesh(object);
    }

    function captureState() {
        const state = scene.children
            .filter(o => o.userData.isEgg)
            .map(obj => ({
                pos: { x: obj.position.x, y: obj.position.y, z: obj.position.z },
                rot: { x: obj.quaternion.x, y: obj.quaternion.y, z: obj.quaternion.z, w: obj.quaternion.w },
                scale: {
                    x: obj.userData.data.scale.x,
                    y: obj.userData.data.scale.y,
                    z: obj.userData.data.scale.z
                },
                col: obj.material.color.getHex(),
                shapeType: obj.userData.shapeType,
                deformOffsets: Array.from(obj.geometry.userData.deformOffsets)
            }));

        const json = JSON.stringify(state);
        if (historyIndex >= 0 && history[historyIndex] === json) return;

        history = history.slice(0, historyIndex + 1);
        history.push(json);
        historyIndex = history.length - 1;
    }

    function applyState(json) {
        const state = JSON.parse(json);

        scene.children
            .filter(o => o.userData.isEgg)
            .forEach(obj => {
                obj.geometry.dispose();
                obj.userData.outline.geometry.dispose();
                obj.material.dispose();
                obj.userData.outline.material.dispose();
                scene.remove(obj);
            });

        state.forEach(d => {
            const mesh = createShapeMesh(d.shapeType || 'egg', new THREE.Color(d.col));
            mesh.position.set(d.pos.x, d.pos.y, d.pos.z);
            mesh.quaternion.set(d.rot.x, d.rot.y, d.rot.z, d.rot.w);
            mesh.userData.data.scale.set(d.scale.x, d.scale.y, d.scale.z);
            if (d.deformOffsets) mesh.geometry.userData.deformOffsets.set(d.deformOffsets);
            updateMesh(mesh);
            scene.add(mesh);
        });

        updateSelectionVisuals([]);
    }

    window.executeUndo = function() {
        if (historyIndex <= 0) return;
        historyIndex -= 1;
        applyState(history[historyIndex]);
    };

    window.executeRedo = function() {
        if (historyIndex >= history.length - 1) return;
        historyIndex += 1;
        applyState(history[historyIndex]);
    };

    function onDown(e) {
        if (e.target.tagName !== 'CANVAS') return;

        const raycaster = getPointerRay(e);
        const activeGizmos = currentTool === 'scale'
            ? groupHandles
            : currentTool === 'rotate'
                ? groupRotHandles
                : currentTool === 'stretch'
                    ? stretchHandles
                    : [];
        const gizmoHits = raycaster.intersectObjects(activeGizmos);

        if (gizmoHits.length > 0) {
            dragTarget = gizmoHits[0].object;
            isDragging = true;
            controls.enabled = false;

            const plane = new THREE.Plane(
                camera.getWorldDirection(new THREE.Vector3()).negate(),
                -dragTarget.position.dot(camera.getWorldDirection(new THREE.Vector3()).negate())
            );
            const intersect = new THREE.Vector3();
            raycaster.ray.intersectPlane(plane, intersect);

            const box = new THREE.Box3();
            currentSelection.forEach(obj => {
                obj.geometry.computeBoundingBox();
                box.union(obj.geometry.boundingBox.clone().applyMatrix4(obj.matrixWorld));
            });
            const groupCenter = box.getCenter(new THREE.Vector3());

            startGroupData = currentSelection.map(obj => ({
                pos: obj.position.clone(),
                scale: obj.userData.data.scale.clone(),
                rot: obj.quaternion.clone()
            }));
            startHandleDist = intersect.distanceTo(groupCenter);

            if (dragTarget.userData.isStretchHandle && currentSelection.length > 0) {
                const selected = currentSelection[0];
                const worldDir = dragTarget.userData.worldDirection.clone().normalize();
                const localOrigin = selected.worldToLocal(selected.position.clone());
                const localDirPoint = selected.worldToLocal(selected.position.clone().add(worldDir));
                let localDir = localDirPoint.sub(localOrigin).normalize();
                if (localDir.lengthSq() === 0) localDir.set(0, 1, 0);

                deformSession = {
                    object: selected,
                    plane,
                    startPoint: intersect.clone(),
                    worldDirection: worldDir,
                    localDirection: localDir,
                    localAnchor: selected.worldToLocal(dragTarget.position.clone()),
                    baseOffsets: selected.geometry.userData.deformOffsets.slice()
                };
            }

            const sPos = dragTarget.position.clone().project(camera);
            startMouseAngle = Math.atan2(
                e.clientY - (window.innerHeight / 2 * (1 - sPos.y)),
                e.clientX - (window.innerWidth / 2 * (1 + sPos.x))
            );
            return;
        }

        const shapeHits = raycaster.intersectObjects(scene.children.filter(o => o.userData.isEgg));
        if (shapeHits.length > 0) {
            dragTarget = shapeHits[0].object;

            if (!e.ctrlKey && !currentSelection.includes(dragTarget)) updateSelectionVisuals([dragTarget]);
            else if (e.ctrlKey && !currentSelection.includes(dragTarget)) updateSelectionVisuals([...currentSelection, dragTarget]);

            if (currentTool === 'pointer') {
                isDragging = true;
                controls.enabled = false;

                const dragPlane = new THREE.Plane(
                    camera.getWorldDirection(new THREE.Vector3()).negate(),
                    -dragTarget.position.dot(camera.getWorldDirection(new THREE.Vector3()).negate())
                );
                const intersection = new THREE.Vector3();
                if (raycaster.ray.intersectPlane(dragPlane, intersection)) {
                    dragStartPoint = intersection.clone();
                    startPositions = currentSelection.map(obj => obj.position.clone());
                } else {
                    dragStartPoint = null;
                    startPositions = [];
                }
            }
        } else {
            dragTarget = null;
            deformSession = null;
            if (isPlacementMode && e.button === 0) {
                spawnShape(new THREE.Vector3(0, 0, 0));
            } else if (currentTool === 'pointer' && e.button === 2) {
                isBoxSelecting = true;
                boxStart.set(e.clientX, e.clientY);
                document.getElementById('select-box').style.display = 'block';
                updateSelectionVisuals([]);
                controls.enabled = false;
            } else {
                updateSelectionVisuals([]);
            }
        }
    }

    function onMove(e) {
        if (isBoxSelecting) {
            const el = document.getElementById('select-box');
            const x = Math.min(boxStart.x, e.clientX);
            const y = Math.min(boxStart.y, e.clientY);
            const w = Math.abs(e.clientX - boxStart.x);
            const h = Math.abs(e.clientY - boxStart.y);
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.width = w + 'px';
            el.style.height = h + 'px';
            return;
        }

        if (!isDragging || !dragTarget) return;
        if (dragTarget.userData.isEgg && dragStartPoint === null && currentTool === 'pointer') return;

        const raycaster = getPointerRay(e);
        const plane = new THREE.Plane(
            camera.getWorldDirection(new THREE.Vector3()).negate(),
            -dragTarget.position.dot(camera.getWorldDirection(new THREE.Vector3()).negate())
        );
        const intersect = new THREE.Vector3();

        if (dragTarget.userData.isEgg && currentTool === 'pointer') {
            if (!raycaster.ray.intersectPlane(plane, intersect)) return;
            const delta = intersect.clone().sub(dragStartPoint);
            currentSelection.forEach((obj, i) => {
                const startPos = startPositions[i];
                obj.position.set(startPos.x + delta.x, startPos.y + delta.y, startPos.z + delta.z);
            });
            updateGroupGizmoVisuals();
        } else if (dragTarget.userData.isGroupHandle && currentTool === 'scale') {
            if (!raycaster.ray.intersectPlane(plane, intersect)) return;
            const box = new THREE.Box3();
            currentSelection.forEach(obj => {
                obj.geometry.computeBoundingBox();
                box.union(obj.geometry.boundingBox.clone().applyMatrix4(obj.matrixWorld));
            });
            const groupCenter = box.getCenter(new THREE.Vector3());
            const ratio = intersect.distanceTo(groupCenter) / startHandleDist;

            currentSelection.forEach((obj, i) => {
                const sd = startGroupData[i];
                obj.userData.data.scale.copy(sd.scale).multiplyScalar(ratio);
                updateMesh(obj);
                obj.position.copy(groupCenter).add(sd.pos.clone().sub(groupCenter).multiplyScalar(ratio));
            });
            updateGroupGizmoVisuals();
        } else if (dragTarget.userData.isGroupRotationHandle && currentTool === 'rotate') {
            if (!raycaster.ray.intersectPlane(plane, intersect)) return;
            const box = new THREE.Box3();
            currentSelection.forEach(obj => {
                obj.geometry.computeBoundingBox();
                box.union(obj.geometry.boundingBox.clone().applyMatrix4(obj.matrixWorld));
            });
            const groupCenter = box.getCenter(new THREE.Vector3());
            const sPos = dragTarget.position.clone().project(camera);
            const angle = Math.atan2(
                e.clientY - (window.innerHeight / 2 * (1 - sPos.y)),
                e.clientX - (window.innerWidth / 2 * (1 + sPos.x))
            );
            const axis = dragTarget.userData.axis === 'x'
                ? new THREE.Vector3(1, 0, 0)
                : dragTarget.userData.axis === 'y'
                    ? new THREE.Vector3(0, 1, 0)
                    : new THREE.Vector3(0, 0, 1);
            const rotQ = new THREE.Quaternion().setFromAxisAngle(axis, -(angle - startMouseAngle));

            currentSelection.forEach((obj, i) => {
                const sd = startGroupData[i];
                obj.position.copy(groupCenter).add(sd.pos.clone().sub(groupCenter).applyQuaternion(rotQ));
                obj.quaternion.multiplyQuaternions(rotQ, sd.rot);
            });
            updateGroupGizmoVisuals();
        } else if (dragTarget.userData.isStretchHandle && currentTool === 'stretch' && deformSession) {
            if (!raycaster.ray.intersectPlane(deformSession.plane, intersect)) return;
            const deltaWorld = intersect.clone().sub(deformSession.startPoint);
            const amount = deltaWorld.dot(deformSession.worldDirection) * 2.4;
            applyStretch(deformSession.object, deformSession, amount);
            updateGroupGizmoVisuals();
        }
    }

    function onUp(e) {
        if (isBoxSelecting) {
            isBoxSelecting = false;
            document.getElementById('select-box').style.display = 'none';

            const minX = Math.min(boxStart.x, e.clientX);
            const minY = Math.min(boxStart.y, e.clientY);
            const maxX = Math.max(boxStart.x, e.clientX);
            const maxY = Math.max(boxStart.y, e.clientY);

            if (Math.abs(maxX - minX) > 5) {
                const selected = scene.children
                    .filter(o => o.userData.isEgg)
                    .filter(mesh => {
                        const sp = mesh.position.clone().project(camera);
                        const x = (sp.x + 1) * window.innerWidth / 2;
                        const y = (1 - sp.y) * window.innerHeight / 2;
                        return x >= minX && x <= maxX && y >= minY && y <= maxY;
                    });
                updateSelectionVisuals(selected);
            }
        }

        if (isDragging) captureState();
        isDragging = false;
        dragTarget = null;
        dragStartPoint = null;
        startPositions = [];
        deformSession = null;
        controls.enabled = true;
    }

    function createGhost() {
        ghostShape = createShapeMesh(placementShape, 0x28a745, true);
        ghostShape.visible = false;
        scene.add(ghostShape);
    }

    function togglePlacementMode() {
        isPlacementMode = !isPlacementMode;
        ghostShape.position.set(0, BASE_H / 2, 0);
        ghostShape.visible = isPlacementMode;
        document.getElementById('spawn-btn').classList.toggle('active', isPlacementMode);
    }

    function spawnShape(pos) {
        const mesh = createShapeMesh(placementShape, 0xff69b4);
        mesh.position.copy(pos).y += BASE_H / 2;
        scene.add(mesh);
        captureState();
        isPlacementMode = false;
        ghostShape.visible = false;
        document.getElementById('spawn-btn').classList.remove('active');
        updateSelectionVisuals([mesh]);
    }

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }

    window.onload = init;
    window.updateColor = (c) => {
        if (currentSelection.length > 0) {
            currentSelection.forEach(obj => obj.material.color.set(c));
            captureState();
        }
    };
    window.setToolMode = setToolMode;
    window.setPlacementShape = setPlacementShape;
</script>
</body>
</html>
