<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Build-A-Crochet v5.0.6</title>
    <style>
        body { margin: 0; font-family: sans-serif; overflow: hidden; background: #fff; touch-action: none; }
        
        /* Compact Header */
        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; 
            background: rgba(255, 255, 255, 0.9); border-bottom: 2px solid #ff69b4; z-index: 100;
            padding: 5px; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
        }
        .box { display: flex; flex-direction: column; align-items: center; background: #fff; border-radius: 5px; padding: 2px; border: 1px solid #eee; }
        label { font-size: 9px; color: #ff69b4; font-weight: bold; margin-bottom: 2px; }
        
        .ctrl { display: flex; align-items: center; gap: 2px; }
        .btn-s { background: #f0f0f0; border: 1px solid #ccc; width: 22px; height: 22px; border-radius: 3px; font-size: 10px; font-weight: bold; cursor: pointer; }
        input { width: 28px; text-align: center; font-size: 10px; border: 1px solid #ddd; border-radius: 3px; }
        select { font-size: 10px; width: 80px; }

        /* Pattern Drawer */
        #pattern-box {
            position: absolute; bottom: -100%; left: 0; width: 100%; height: 60%;
            background: white; z-index: 1000; transition: 0.4s; border-top: 4px solid #ff69b4;
            overflow-y: auto; padding: 15px; box-sizing: border-box;
        }
        #pattern-box.open { bottom: 0; }
        .close-btn { background: #ff69b4; color: white; border: none; padding: 8px; width: 100%; border-radius: 5px; font-weight: bold; }

        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 10; }
        #gen-btn { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #ff69b4; color: white; border: none; padding: 10px 20px; 
            border-radius: 20px; font-weight: bold; z-index: 90; font-size: 12px;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="box">
        <label>PART</label>
        <select id="part-sel" onchange="syncUI()">
            <option value="body">Body</option>
            <option value="eyeL">Eye L</option>
            <option value="eyeR">Eye R</option>
        </select>
    </div>
    <div class="box">
        <label>WIDTH / HEIGHT</label>
        <div class="ctrl">
            <button class="btn-s" onclick="adjust('w',-0.5)">W-</button>
            <button class="btn-s" onclick="adjust('w',0.5)">W+</button>
            <button class="btn-s" onclick="adjust('h',-0.5)">H-</button>
