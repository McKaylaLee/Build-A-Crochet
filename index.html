<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Build-A-Crochet v5.0.5</title>
    <style>
        body { margin: 0; font-family: sans-serif; overflow: hidden; background: #ffffff; touch-action: none; }
        
        /* Dashboard Layout */
        #top-bar { 
            position: absolute; top: 0; left: 0; width: 100%; height: 130px;
            background: rgba(255, 255, 255, 0.95); border-bottom: 2px solid #ff69b4; z-index: 100;
            display: flex; flex-direction: column; justify-content: space-evenly; padding: 5px 0;
        }
        .row { display: flex; justify-content: space-around; width: 100%; align-items: center; }
        .item { display: flex; align-items: center; gap: 3px; scale: 0.85; }
        label { font-size: 10px; color: #ff69b4; font-weight: bold; min-width: 45px; text-transform: uppercase; }
        
        select, input { background: #fff; border: 1px solid #ccc; font-size: 11px; border-radius: 4px; padding: 2px; text-align: center; }
        .btn-s { background: #f8f8f8; border: 1px solid #ccc; width: 30px; height: 30px; border-radius: 4px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-s:active { background: #ff69b4; color: white; }

        /* Pattern Overlay (The "Drawer") */
        #pattern-overlay {
            position: absolute; bottom: -100%; left: 0; width: 100%; height: 70%;
            background: white; z-index: 1000; transition: 0.3s; border-top: 5px solid #ff69b4;
            overflow-y: auto; padding: 20px; box-sizing: border-box;
        }
        #pattern-overlay.open { bottom: 0; }
        .close-btn { background: #ff69b4; color: white; border: none; padding: 10px; border-radius: 5px; width: 100%; font-weight: bold; margin-bottom: 15px; }

        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        button#gen-btn { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #ff69b4; color: white; border: none; padding: 15px 30px; 
            border-radius: 30px; font-weight: bold; cursor: pointer; z-index: 90; box-shadow: 0 4px 15px rgba(255,105,180,0.4);
        }
    </style>
</head>
<body>

<div id="top-bar">
    <div class="row">
        <div class="item">
            <label>Part</label>
            <select id="part-sel" onchange="syncUI()" style="width:100px;">
                <option value="body">Body (Main)</option>
                <option value="eyeL">Left Eye</option>
                <option value="eyeR">Right Eye</option>
            </select>
        </div>
        <div class="item">
            <label>Width</label
