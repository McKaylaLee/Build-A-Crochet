<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v5.35.0 - Builder Mode</title>
    <style>
        :root {
            --bg: #f5f5f2;
            --panel: #ffffff;
            --line: #d8d8d2;
            --soft: #ecece6;
            --text: #1f1f1c;
            --muted: #66665f;
            --accent: #ff6ea8;
            --accent-2: #ffd84d;
            --green: #2da562;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: monospace;
            touch-action: none;
            user-select: none;
        }

        #app {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 96px 1fr 240px;
            grid-template-rows: 62px 1fr;
            grid-template-areas:
                "left top right"
                "left canvas right";
        }

        #leftbar, #topbar, #rightbar {
            background: var(--panel);
            z-index: 10;
        }

        #leftbar {
            grid-area: left;
            border-right: 1px solid var(--line);
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
        }

        #topbar {
            grid-area: top;
            border-bottom: 1px solid var(--line);
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        #rightbar {
            grid-area: right;
            border-left: 1px solid var(--line);
            padding: 14px 12px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        #canvas-wrap {
            grid-area: canvas;
            position: relative;
            overflow: hidden;
        }

        .stack { display: flex; flex-direction: column; gap: 8px; }
        .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .label {
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.4px;
        }

        .btn {
            border: 1px solid var(--line);
            background: var(--soft);
            color: var(--text);
            border-radius: 8px;
            padding: 8px 6px;
            cursor: pointer;
            font: inherit;
            font-size: 10px;
            line-height: 1.1;
            text-align: center;
            min-height: 42px;
        }

        .tool-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            min-height: 54px;
        }

        .tool-btn .icon {
            font-size: 17px;
            line-height: 1;
        }

        .btn.active {
            background: var(--accent);
            color: #fff;
            border-color: #ff9bc2;
        }

        .btn.green.active {
            background: var(--green);
            border-color: #6ccc95;
        }

        .divider {
            height: 1px;
            background: var(--line);
            margin: 2px 0;
        }

        .top-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .top-btn {
            min-height: 36px;
            min-width: 66px;
            padding: 8px 10px;
        }

        .title {
            font-weight: bold;
            font-size: 12px;
        }

        .subtitle {
            font-size: 10px;
            color: var(--muted);
        }

        .panel-card {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px;
            background: #fcfcfa;
        }

        .value {
            font-size: 12px;
            color: var(--text);
        }

        .mini-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .swatch {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.12);
            cursor: pointer;
        }

        #select-box {
            border: 2px dashed var(--accent);
            background: rgba(255, 110, 168, 0.08);
            position: absolute;
            pointer-events: none;
            display: none;
            z-index: 5;
        }

        #version-tag {
            position: absolute;
            right: 14px;
            bottom: 14px;
            background: rgba(255,255,255,0.88);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 11px;
            color: var(--muted);
            z-index: 6;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div id="app">
    <aside id="leftbar">
        <div class="label">TOOLS</div>
        <button class="btn tool-btn active" id="tool-pointer" onclick="setToolMode('pointer')"><span class="icon">↖</span><span>SELECT</span></button>
        <button class="btn tool-btn" id="tool-rotate" onclick="setToolMode('rotate')"><span class="icon">↻</span><span>ROTATE</span></button>
        <button class="btn tool-btn" id="tool-scale" onclick="setToolMode('scale')"><span class="icon">⤢</span><span>SIZE</span></button>
        <button class="btn tool-btn" id="tool-stretch" onclick="setToolMode('stretch')"><span class="icon">⇱</span><span>STRETCH</span></button>

        <div class="divider"></div>

        <div class="label">SHAPES</div>
        <button class="btn shape-btn active" id="shape-oval" onclick="setPlacementShape('oval')">OVAL</button>
        <button class="btn shape-btn" id="shape-paraboloid" onclick="setPlacementShape('paraboloid')">PARA</button>
        <button class="btn shape-btn" id="shape-sphere" onclick="setPlacementShape('sphere')">SPHERE</button>
        <button class="btn shape-btn" id="shape-cylinder" onclick="setPlacementShape('cylinder')">CYL</button>
        <button class="btn shape-btn" id="shape-cone" onclick="setPlacementShape('cone')">CONE</button>
        <button class="btn green" id="place-btn" onclick="togglePlacementMode()">PLACE</button>
    </aside>

    <header id="topbar">
        <div class="top-group">
            <div>
                <div class="title">Build-A-Crochet</div>
                <div class="subtitle">Builder-style workspace</div>
            </div>
        </div>

        <div class="top-group">
            <button class="btn top-btn" onclick="executeUndo()">UNDO</button>
            <button class="btn top-btn" onclick="executeRedo()">REDO</button>
            <button class="btn top-btn" onclick="duplicateSelection()">DUP</button>
            <button class="btn top-btn" onclick="deleteSelection()">DELETE</button>
            <button class="btn top-btn" id="snap-btn" onclick="toggleSnap()">SNAP ON</button>
            <button class="btn top-btn" onclick="resetView()">VIEW</button>
        </div>
    </header>

    <main id="canvas-wrap">
        <div id="select-box"></div>
        <div id="version-tag">v5.35.0</div>
    </main>

    <aside id="rightbar">
        <div class="panel-card stack">
            <div class="label">SELECTION</div>
            <div class="value" id="selection-name">Nothing selected</div>
            <div class="subtitle" id="selection-count">0 objects</div>
        </div>

        <div class="panel-card stack">
            <div class="label">POSITION</div>
            <div class="mini-grid">
                <div class="value" id="pos-x">X: -</div>
                <div class="value" id="pos-y">Y: -</div>
                <div class="value" id="pos-z">Z: -</div>
            </div>
        </div>

        <div class="panel-card stack">
            <div class="label">SIZE</div>
            <div class="mini-grid">
                <div class="value" id="scale-x">W: -</div>
                <div class="value" id="scale-y">H: -</div>
                <div class="value" id="scale-z">D: -</div>
            </div>
        </div>

        <div class="panel-card stack">
            <div class="label">COLOR</div>
            <div class="row">
                <button class="swatch" style="background:#ff69b4" onclick="updateColor('#ff69b4')"></button>
                <button class="swatch" style="background:#ffffff" onclick="updateColor('#ffffff')"></button>
                <button class="swatch" style="background:#000000" onclick="updateColor('#000000')"></button>
                <button class="swatch" style="background:#7ed957" onclick="updateColor('#7ed957')"></button>
            </div>
        </div>
    </aside>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, gridHelper, ghostShape;
    let currentTool = 'pointer';
    let placementShape = 'oval';
    let isPlacementMode = false;
    let isDragging = false;
    let dragTarget = null;
    let dragStartPoint = null;
    let dragPlane = null;
    let startPositions = [];
    let startGroupData = [];
    let startHandleDist = 1;
    let startMouseAngle = 0;
    let currentSelection = [];
    let isBoxSelecting = false;
    let boxStart = new THREE.Vector2();
    let snapEnabled = true;

    let groupGizmo;
    let scaleHandles = [];
    let stretchHandles = [];
    let rotateHandles = [];

    let history = [];
    let historyIndex = -1;

    const BASE_H = 96;
    const BASE_R = 36;
    const STRETCH_RADIUS = 46;
    const SNAP_STEP = 4;

    const tmpA = new THREE.Vector3();
    const tmpB = new THREE.Vector3();
    const tmpC = new THREE.Vector3();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf5f5f2);

        const wrap = document.getElementById('canvas-wrap');

        camera = new THREE.PerspectiveCamera(45, wrap.clientWidth / wrap.clientHeight, 0.1, 5000);
        camera.position.set(260, 220, 260);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(wrap.clientWidth, wrap.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        wrap.appendChild(renderer.domElement);
        wrap.insertBefore(renderer.domElement, document.getElementById('select-box'));
        renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());

        gridHelper = new THREE.GridHelper(1000, 50, 0x8a8a83, 0xd6d6ce);
        gridHelper.position.y = -0.2;
        scene.add(gridHelper);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
        dirLight.position.set(120, 220, 100);
        scene.add(dirLight);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: null };
        controls.target.set(0, BASE_H * 0.5, 0);
        controls.update();

        createGizmos();
        createGhost();

        window.addEventListener('resize', onResize);
        window.addEventListener('pointerdown', onDown);
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        window.addEventListener('keydown', onKey);

        captureState();
        animate();
        updateInspector();
    }

    function onResize() {
        const wrap = document.getElementById('canvas-wrap');
        camera.aspect = wrap.clientWidth / wrap.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(wrap.clientWidth, wrap.clientHeight);
    }

    function onKey(e) {
        if (e.key === "Delete" || e.key === "Backspace") deleteSelection();
    }

    function setToolMode(mode) {
        currentTool = mode;
        document.getElementById('tool-pointer').classList.toggle('active', mode === 'pointer');
        document.getElementById('tool-rotate').classList.toggle('active', mode === 'rotate');
        document.getElementById('tool-scale').classList.toggle('active', mode === 'scale');
        document.getElementById('tool-stretch').classList.toggle('active', mode === 'stretch');
        updateSelectionVisuals(currentSelection);
    }

    function setPlacementShape(shape) {
        placementShape = shape;
        ['oval', 'paraboloid', 'sphere', 'cylinder', 'cone'].forEach(name => {
            document.getElementById('shape-' + name).classList.toggle('active', name === shape);
        });
        if (ghostShape) {
            scene.remove(ghostShape);
            ghostShape.geometry.dispose();
            ghostShape.material.dispose();
        }
        createGhost();
        ghostShape.visible = isPlacementMode;
    }

    function togglePlacementMode() {
        isPlacementMode = !isPlacementMode;
        document.getElementById('place-btn').classList.toggle('active', isPlacementMode);
        ghostShape.position.set(0, BASE_H * 0.5, 0);
        ghostShape.visible = isPlacementMode;
    }

    function toggleSnap() {
        snapEnabled = !snapEnabled;
        document.getElementById('snap-btn').textContent = snapEnabled ? 'SNAP ON' : 'SNAP OFF';
        document.getElementById('snap-btn').classList.toggle('active', snapEnabled);
    }

    function resetView() {
        camera.position.set(260, 220, 260);
        controls.target.set(0, BASE_H * 0.5, 0);
        controls.update();
    }

    function createProfile(shapeType) {
        const points = [];
        for (let i = 0; i <= 24; i++) {
            const t = i / 24;
            const y = t * BASE_H;
            let r = BASE_R;

            if (shapeType === 'paraboloid') r = BASE_R * Math.pow(t, 0.62);
            else if (shapeType === 'sphere') r = BASE_R * Math.sqrt(Math.max(0, 1 - Math.pow((t - 0.5) / 0.5, 2)));
            else if (shapeType === 'cylinder') r = BASE_R * 0.8;
            else if (shapeType === 'cone') r = BASE_R * (1 - t);
            else r = BASE_R * Math.sqrt(Math.max(0, 1 - Math.pow((t - 0.5) / 0.5, 2)));

            points.push(new THREE.Vector2(Math.max(0.1, r), y));
        }
        return points;
    }

    function createShapeMesh(shapeType, color, isGhost = false) {
        const geo = new THREE.LatheGeometry(createProfile(shapeType), 32);
        geo.translate(0, -BASE_H / 2, 0);
        geo.userData.origPos = geo.attributes.position.clone();
        geo.userData.deformOffsets = new Float32Array(geo.attributes.position.count * 3);

        const mat = new THREE.MeshPhongMaterial({
            color,
            wireframe: true,
            transparent: true,
            opacity: isGhost ? 0.28 : 0.82
        });

        const mesh = new THREE.Mesh(geo, mat);

        if (!isGhost) {
            mesh.userData.isShape = true;
            mesh.userData.shapeType = shapeType;
            mesh.userData.data = { scale: new THREE.Vector3(1, 1, 1) };

            const outline = new THREE.Mesh(
                geo.clone(),
                new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.BackSide })
            );
            outline.scale.set(1.02, 1.02, 1.02);
            mesh.add(outline);
            mesh.userData.outline = outline;
        }

        return mesh;
    }

    function createGhost() {
        ghostShape = createShapeMesh(placementShape, 0x2da562, true);
        ghostShape.visible = false;
        scene.add(ghostShape);
    }

    function updateMesh(mesh) {
        const pos = mesh.geometry.attributes.position;
        const orig = mesh.geometry.userData.origPos;
        const offsets = mesh.geometry.userData.deformOffsets;
        const scale = mesh.userData.data.scale;

        for (let i = 0; i < orig.count; i++) {
            const idx = i * 3;
            pos.setXYZ(
                i,
                orig.getX(i) * scale.x + offsets[idx],
                orig.getY(i) * scale.y + offsets[idx + 1],
                orig.getZ(i) * scale.z + offsets[idx + 2]
            );
        }

        pos.needsUpdate = true;
        mesh.geometry.computeBoundingBox();
        mesh.geometry.computeBoundingSphere();
        mesh.geometry.computeVertexNormals();

        const outlinePos = mesh.userData.outline.geometry.attributes.position;
        outlinePos.copy(pos);
        outlinePos.needsUpdate = true;
        mesh.userData.outline.geometry.computeBoundingBox();
        mesh.userData.outline.geometry.computeBoundingSphere();
        mesh.userData.outline.geometry.computeVertexNormals();
    }

    function createHandle(color, data) {
        const h = new THREE.Mesh(
            new THREE.SphereGeometry(2.8, 16, 16),
            new THREE.MeshBasicMaterial({ color, depthTest: false })
        );
        h.renderOrder = 999;
        h.visible = false;
        h.userData = data;
        scene.add(h);
        return h;
    }

    function createGizmos() {
        groupGizmo = new THREE.BoxHelper(new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1)), 0xff6ea8);
        groupGizmo.visible = false;
        scene.add(groupGizmo);

        for (let i = 0; i < 10; i++) {
            scaleHandles.push(createHandle(0xffd84d, { isScaleHandle: true, id: i }));
            stretchHandles.push(createHandle(0xffd84d, { isStretchHandle: true, id: i, worldDirection: new THREE.Vector3() }));
        }

        const mkRot = (color, axis) => {
            const r = new THREE.Mesh(
                new THREE.TorusGeometry(38, 0.8, 16, 64),
                new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.65, depthTest: false })
            );
            r.renderOrder = 998;
            r.visible = false;
            r.userData = { isRotateHandle: true, axis };
            scene.add(r);
            return r;
        };

        rotateHandles = [mkRot(0xff4e4e, 'x'), mkRot(0x50bd65, 'y'), mkRot(0x4d7fff, 'z')];
    }

    function getShapeObjects() {
        return scene.children.filter(o => o.userData.isShape);
    }

    function updateSelectionVisuals(selected) {
        getShapeObjects().forEach(o => o.userData.outline.scale.set(1.02, 1.02, 1.02));
        scaleHandles.forEach(h => h.visible = false);
        stretchHandles.forEach(h => h.visible = false);
        rotateHandles.forEach(h => h.visible = false);
        groupGizmo.visible = false;

        currentSelection = selected;
        if (selected.length === 0) {
            updateInspector();
            return;
        }

        selected.forEach(o => o.userData.outline.scale.set(1.1, 1.1, 1.1));

        if (currentTool === 'scale' || currentTool === 'stretch' || currentTool === 'rotate') groupGizmo.visible = true;
        if (currentTool === 'scale') scaleHandles.forEach(h => h.visible = true);
        if (currentTool === 'stretch') stretchHandles.forEach(h => h.visible = true);
        if (currentTool === 'rotate') rotateHandles.forEach(h => h.visible = true);

        updateGroupGizmoVisuals();
        updateInspector();
    }

    function updateGroupGizmoVisuals() {
        if (currentSelection.length === 0) return;

        const box = new THREE.Box3();
        currentSelection.forEach(obj => {
            obj.geometry.computeBoundingBox();
            box.union(obj.geometry.boundingBox.clone().applyMatrix4(obj.matrixWorld));
        });

        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const helper = new THREE.Mesh(new THREE.BoxGeometry(size.x, size.y, size.z));
        helper.position.copy(center);
        groupGizmo.update(helper);

        const points = [
            new THREE.Vector3(-0.5, 0.5, 0.5),
            new THREE.Vector3(-0.5, 0.5, -0.5),
            new THREE.Vector3(-0.5, -0.5, 0.5),
            new THREE.Vector3(-0.5, -0.5, -0.5),
            new THREE.Vector3(0.5, 0.5, 0.5),
            new THREE.Vector3(0.5, 0.5, -0.5),
            new THREE.Vector3(0.5, -0.5, 0.5),
            new THREE.Vector3(0.5, -0.5, -0.5),
            new THREE.Vector3(0, 0.5, 0),
            new THREE.Vector3(0, -0.5, 0)
        ];

        scaleHandles.forEach((h, i) => {
            h.position.copy(center).add(points[i].clone().multiply(size));
        });

        stretchHandles.forEach((h, i) => {
            const offset = points[i].clone().multiply(size);
            h.position.copy(center).add(offset);
            h.userData.worldDirection.copy(offset.lengthSq() === 0 ? new THREE.Vector3(0, 1, 0) : offset.clone().normalize());
        });

        rotateHandles.forEach((r, i) => {
            r.position.copy(center);
            r.rotation.set(0, 0, 0);
            const s = Math.max(size.x, size.y, size.z) * 0.8 + 10;
            r.scale.set(s / 38, s / 38, s / 38);
            if (i === 0) r.rotateY(Math.PI / 2);
            if (i === 1) r.rotateX(Math.PI / 2);
        });
    }

    function getPointerRay(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(
            ((e.clientX - rect.left) / rect.width) * 2 - 1,
            -((e.clientY - rect.top) / rect.height) * 2 + 1
        );
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);
        return raycaster;
    }

    function snapValue(v) {
        return Math.round(v / SNAP_STEP) * SNAP_STEP;
    }

    function snapVector3(v) {
        v.set(snapValue(v.x), snapValue(v.y), snapValue(v.z));
    }

    function captureState() {
        const state = getShapeObjects().map(obj => ({
            pos: { x: obj.position.x, y: obj.position.y, z: obj.position.z },
            rot: { x: obj.quaternion.x, y: obj.quaternion.y, z: obj.quaternion.z, w: obj.quaternion.w },
            scale: { x: obj.userData.data.scale.x, y: obj.userData.data.scale.y, z: obj.userData.data.scale.z },
            col: obj.material.color.getHex(),
            shapeType: obj.userData.shapeType,
            deformOffsets: Array.from(obj.geometry.userData.deformOffsets)
        }));

        const json = JSON.stringify(state);
        if (historyIndex >= 0 && history[historyIndex] === json) return;

        history = history.slice(0, historyIndex + 1);
        history.push(json);
        historyIndex = history.length - 1;
    }

    function applyState(json) {
        getShapeObjects().forEach(obj => {
            obj.geometry.dispose();
            obj.userData.outline.geometry.dispose();
            obj.material.dispose();
            obj.userData.outline.material.dispose();
            scene.remove(obj);
        });

        const state = JSON.parse(json);
        state.forEach(d => {
            const obj = createShapeMesh(d.shapeType || 'oval', new THREE.Color(d.col));
            obj.position.set(d.pos.x, d.pos.y, d.pos.z);
            obj.quaternion.set(d.rot.x, d.rot.y, d.rot.z, d.rot.w);
            obj.userData.data.scale.set(d.scale.x, d.scale.y, d.scale.z);
            if (d.deformOffsets) obj.geometry.userData.deformOffsets.set(d.deformOffsets);
            updateMesh(obj);
            scene.add(obj);
        });

        updateSelectionVisuals([]);
    }

    function executeUndo() {
        if (historyIndex <= 0) return;
        historyIndex -= 1;
        applyState(history[historyIndex]);
    }

    function executeRedo() {
        if (historyIndex >= history.length - 1) return;
        historyIndex += 1;
        applyState(history[historyIndex]);
    }

    function duplicateSelection() {
        if (currentSelection.length === 0) return;

        const clones = [];
        currentSelection.forEach(obj => {
            const clone = createShapeMesh(obj.userData.shapeType, obj.material.color.getHex());
            clone.position.copy(obj.position).add(new THREE.Vector3(8, 0, 8));
            clone.quaternion.copy(obj.quaternion);
            clone.userData.data.scale.copy(obj.userData.data.scale);
            clone.geometry.userData.deformOffsets.set(obj.geometry.userData.deformOffsets);
            updateMesh(clone);
            scene.add(clone);
            clones.push(clone);
        });

        updateSelectionVisuals(clones);
        captureState();
    }

    function deleteSelection() {
        if (currentSelection.length === 0) return;
        currentSelection.forEach(obj => {
            obj.geometry.dispose();
            obj.userData.outline.geometry.dispose();
            obj.material.dispose();
            obj.userData.outline.material.dispose();
            scene.remove(obj);
        });
        updateSelectionVisuals([]);
        captureState();
    }

    function updateColor(color) {
        if (currentSelection.length === 0) return;
        currentSelection.forEach(obj => obj.material.color.set(color));
        captureState();
    }

    function spawnShape(pos) {
        const obj = createShapeMesh(placementShape, 0xff69b4);
        obj.position.copy(pos);
        obj.position.y += BASE_H / 2;
        if (snapEnabled) snapVector3(obj.position);
        scene.add(obj);
        updateSelectionVisuals([obj]);
        isPlacementMode = false;
        ghostShape.visible = false;
        document.getElementById('place-btn').classList.remove('active');
        captureState();
    }

    function beginObjectMove(hit, raycaster) {
        dragTarget = hit.object;
        isDragging = true;
        controls.enabled = false;

        dragPlane = new THREE.Plane(
            camera.getWorldDirection(new THREE.Vector3()).negate(),
            -dragTarget.position.dot(camera.getWorldDirection(new THREE.Vector3()).negate())
        );

        const intersection = new THREE.Vector3();
        if (raycaster.ray.intersectPlane(dragPlane, intersection)) {
            dragStartPoint = intersection.clone();
            startPositions = currentSelection.map(obj => obj.position.clone());
        } else {
            dragStartPoint = null;
            startPositions = [];
        }
    }

    function applyStretch(object, session, amount) {
        const offsets = object.geometry.userData.deformOffsets;
        offsets.set(session.baseOffsets);

        const orig = object.geometry.userData.origPos;
        const localDir = session.localDirection;
        const localAnchor = session.localAnchor;

        for (let i = 0; i < orig.count; i++) {
            const idx = i * 3;
            const vertex = tmpA.set(
                orig.getX(i) * object.userData.data.scale.x + session.baseOffsets[idx],
                orig.getY(i) * object.userData.data.scale.y + session.baseOffsets[idx + 1],
                orig.getZ(i) * object.userData.data.scale.z + session.baseOffsets[idx + 2]
            );

            const toVertex = tmpB.copy(vertex).sub(localAnchor);
            const aligned = toVertex.dot(localDir);
            if (aligned < -8) continue;

            const alongVec = tmpC.copy(localDir).multiplyScalar(aligned);
            const radial = toVertex.clone().sub(alongVec).length();
            if (radial > STRETCH_RADIUS) continue;

            const radialFalloff = 1 - radial / STRETCH_RADIUS;
            const alongFalloff = Math.max(0, Math.min(1, (aligned + 10) / 34));
            const push = amount * radialFalloff * radialFalloff * alongFalloff;

            offsets[idx] = session.baseOffsets[idx] + localDir.x * push;
            offsets[idx + 1] = session.baseOffsets[idx + 1] + localDir.y * push;
            offsets[idx + 2] = session.baseOffsets[idx + 2] + localDir.z * push;
        }

        updateMesh(object);
    }

    function onDown(e) {
        if (e.target.tagName !== 'CANVAS') return;

        const raycaster = getPointerRay(e);
        const activeGizmos =
            currentTool === 'scale' ? scaleHandles :
            currentTool === 'stretch' ? stretchHandles :
            currentTool === 'rotate' ? rotateHandles : [];

        const gizmoHits = raycaster.intersectObjects(activeGizmos);
        if (gizmoHits.length > 0) {
            dragTarget = gizmoHits[0].object;
            isDragging = true;
            controls.enabled = false;

            dragPlane = new THREE.Plane(
                camera.getWorldDirection(new THREE.Vector3()).negate(),
                -dragTarget.position.dot(camera.getWorldDirection(new THREE.Vector3()).negate())
            );

            const intersect = new THREE.Vector3();
            raycaster.ray.intersectPlane(dragPlane, intersect);

            const box = new THREE.Box3();
            currentSelection.forEach(obj => {
                obj.geometry.computeBoundingBox();
                box.union(obj.geometry.boundingBox.clone().applyMatrix4(obj.matrixWorld));
            });
            const groupCenter = box.getCenter(new THREE.Vector3());

            startGroupData = currentSelection.map(obj => ({
                pos: obj.position.clone(),
                scale: obj.userData.data.scale.clone(),
                rot: obj.quaternion.clone()
            }));
            startHandleDist = intersect.distanceTo(groupCenter);

            if (dragTarget.userData.isStretchHandle && currentSelection.length > 0) {
                const obj = currentSelection[0];
                const worldDir = dragTarget.userData.worldDirection.clone().normalize();
                const localOrigin = obj.worldToLocal(obj.position.clone());
                const localDirPoint = obj.worldToLocal(obj.position.clone().add(worldDir));
                let localDir = localDirPoint.sub(localOrigin).normalize();
                if (localDir.lengthSq() === 0) localDir.set(0, 1, 0);

                deformSession = {
                    object: obj,
                    plane: dragPlane.clone(),
                    startPoint: intersect.clone(),
                    worldDirection: worldDir,
                    localDirection: localDir,
                    localAnchor: obj.worldToLocal(dragTarget.position.clone()),
                    baseOffsets: obj.geometry.userData.deformOffsets.slice()
                };
            }

            const sPos = dragTarget.position.clone().project(camera);
            startMouseAngle = Math.atan2(
                e.clientY - (window.innerHeight / 2 * (1 - sPos.y)),
                e.clientX - (window.innerWidth / 2 * (1 + sPos.x))
            );
            return;
        }

        const hits = raycaster.intersectObjects(getShapeObjects());
        if (hits.length > 0) {
            const hit = hits[0];
            dragTarget = hit.object;

            if (!e.ctrlKey && !currentSelection.includes(dragTarget)) updateSelectionVisuals([dragTarget]);
            else if (e.ctrlKey && !currentSelection.includes(dragTarget)) updateSelectionVisuals([...currentSelection, dragTarget]);

            if (currentTool === 'pointer') beginObjectMove(hit, raycaster);
        } else {
            dragTarget = null;
            deformSession = null;

            if (isPlacementMode && e.button === 0) {
                spawnShape(new THREE.Vector3(0, 0, 0));
            } else if (currentTool === 'pointer' && e.button === 2) {
                isBoxSelecting = true;
                boxStart.set(e.clientX, e.clientY);
                const box = document.getElementById('select-box');
                box.style.display = 'block';
                controls.enabled = false;
                updateSelectionVisuals([]);
            } else {
                updateSelectionVisuals([]);
            }
        }
    }

    function onMove(e) {
        if (isBoxSelecting) {
            const el = document.getElementById('select-box');
            const x = Math.min(boxStart.x, e.clientX);
            const y = Math.min(boxStart.y, e.clientY);
            const w = Math.abs(e.clientX - boxStart.x);
            const h = Math.abs(e.clientY - boxStart.y);
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.width = w + 'px';
            el.style.height = h + 'px';
            return;
        }

        if (!isDragging || !dragTarget) return;

        const raycaster = getPointerRay(e);
        const intersect = new THREE.Vector3();

        if (dragTarget.userData.isShape && currentTool === 'pointer') {
            if (!dragPlane || dragStartPoint === null) return;
            if (!raycaster.ray.intersectPlane(dragPlane, intersect)) return;

            const delta = intersect.clone().sub(dragStartPoint);
            currentSelection.forEach((obj, i) => {
                obj.position.copy(startPositions[i]).add(delta);
                if (snapEnabled) snapVector3(obj.position);
            });
            updateGroupGizmoVisuals();
            updateInspector();
        } else if (dragTarget.userData.isScaleHandle && currentTool === 'scale') {
            if (!raycaster.ray.intersectPlane(dragPlane, intersect)) return;

            const box = new THREE.Box3();
            currentSelection.forEach(obj => {
                obj.geometry.computeBoundingBox();
                box.union(obj.geometry.boundingBox.clone().applyMatrix4(obj.matrixWorld));
            });
            const groupCenter = box.getCenter(new THREE.Vector3());
            const ratio = Math.max(0.15, intersect.distanceTo(groupCenter) / startHandleDist);

            currentSelection.forEach((obj, i) => {
                const sd = startGroupData[i];
                obj.userData.data.scale.copy(sd.scale).multiplyScalar(ratio);
                updateMesh(obj);
                obj.position.copy(groupCenter).add(sd.pos.clone().sub(groupCenter).multiplyScalar(ratio));
                if (snapEnabled) snapVector3(obj.position);
            });
            updateGroupGizmoVisuals();
            updateInspector();
        } else if (dragTarget.userData.isRotateHandle && currentTool === 'rotate') {
            if (!raycaster.ray.intersectPlane(dragPlane, intersect)) return;

            const box = new THREE.Box3();
            currentSelection.forEach(obj => {
                obj.geometry.computeBoundingBox();
                box.union(obj.geometry.boundingBox.clone().applyMatrix4(obj.matrixWorld));
            });
            const groupCenter = box.getCenter(new THREE.Vector3());
            const sPos = dragTarget.position.clone().project(camera);
            const angle = Math.atan2(
                e.clientY - (window.innerHeight / 2 * (1 - sPos.y)),
                e.clientX - (window.innerWidth / 2 * (1 + sPos.x))
            );
            const axis = dragTarget.userData.axis === 'x'
                ? new THREE.Vector3(1, 0, 0)
                : dragTarget.userData.axis === 'y'
                    ? new THREE.Vector3(0, 1, 0)
                    : new THREE.Vector3(0, 0, 1);

            const rotQ = new THREE.Quaternion().setFromAxisAngle(axis, -(angle - startMouseAngle));

            currentSelection.forEach((obj, i) => {
                const sd = startGroupData[i];
                obj.position.copy(groupCenter).add(sd.pos.clone().sub(groupCenter).applyQuaternion(rotQ));
                obj.quaternion.multiplyQuaternions(rotQ, sd.rot);
                if (snapEnabled) snapVector3(obj.position);
            });
            updateGroupGizmoVisuals();
            updateInspector();
        } else if (dragTarget.userData.isStretchHandle && currentTool === 'stretch' && deformSession) {
            if (!raycaster.ray.intersectPlane(deformSession.plane, intersect)) return;
            const deltaWorld = intersect.clone().sub(deformSession.startPoint);
            const amount = deltaWorld.dot(deformSession.worldDirection) * 2.5;
            applyStretch(deformSession.object, deformSession, amount);
            updateGroupGizmoVisuals();
            updateInspector();
        }
    }

    function onUp(e) {
        if (isBoxSelecting) {
            isBoxSelecting = false;
            document.getElementById('select-box').style.display = 'none';

            const minX = Math.min(boxStart.x, e.clientX);
            const minY = Math.min(boxStart.y, e.clientY);
            const maxX = Math.max(boxStart.x, e.clientX);
            const maxY = Math.max(boxStart.y, e.clientY);

            if (Math.abs(maxX - minX) > 5) {
                const selected = getShapeObjects().filter(obj => {
                    const p = obj.position.clone().project(camera);
                    const rect = renderer.domElement.getBoundingClientRect();
                    const x = rect.left + (p.x + 1) * rect.width / 2;
                    const y = rect.top + (1 - p.y) * rect.height / 2;
                    return x >= minX && x <= maxX && y >= minY && y <= maxY;
                });
                updateSelectionVisuals(selected);
            }
        }

        if (isDragging) captureState();
        isDragging = false;
        dragTarget = null;
        dragStartPoint = null;
        dragPlane = null;
        startPositions = [];
        deformSession = null;
        controls.enabled = true;
    }

    function updateInspector() {
        const nameEl = document.getElementById('selection-name');
        const countEl = document.getElementById('selection-count');
        const px = document.getElementById('pos-x');
        const py = document.getElementById('pos-y');
        const pz = document.getElementById('pos-z');
        const sx = document.getElementById('scale-x');
        const sy = document.getElementById('scale-y');
        const sz = document.getElementById('scale-z');

        if (currentSelection.length === 0) {
            nameEl.textContent = 'Nothing selected';
            countEl.textContent = '0 objects';
            px.textContent = 'X: -';
            py.textContent = 'Y: -';
            pz.textContent = 'Z: -';
            sx.textContent = 'W: -';
            sy.textContent = 'H: -';
            sz.textContent = 'D: -';
            return;
        }

        const obj = currentSelection[0];
        nameEl.textContent = obj.userData.shapeType.toUpperCase();
        countEl.textContent = currentSelection.length + (currentSelection.length === 1 ? ' object' : ' objects');
        px.textContent = 'X: ' + obj.position.x.toFixed(1);
        py.textContent = 'Y: ' + obj.position.y.toFixed(1);
        pz.textContent = 'Z: ' + obj.position.z.toFixed(1);
        sx.textContent = 'W: ' + obj.userData.data.scale.x.toFixed(2);
        sy.textContent = 'H: ' + obj.userData.data.scale.y.toFixed(2);
        sz.textContent = 'D: ' + obj.userData.data.scale.z.toFixed(2);
    }

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }

    window.onload = init;
    window.setToolMode = setToolMode;
    window.setPlacementShape = setPlacementShape;
    window.togglePlacementMode = togglePlacementMode;
    window.executeUndo = executeUndo;
    window.executeRedo = executeRedo;
    window.updateColor = updateColor;
    window.duplicateSelection = duplicateSelection;
    window.deleteSelection = deleteSelection;
    window.toggleSnap = toggleSnap;
    window.resetView = resetView;
</script>
</body>
</html>
