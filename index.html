<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v3.5.28</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #fff0f5; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #header { background: white; padding: 10px; text-align: center; border-bottom: 4px solid #ff69b4; }
        #header h1 { margin: 0; color: #d02090; font-size: 22px; text-transform: uppercase; }

        #main-container { display: flex; flex: 1; overflow: hidden; }

        /* Left Side: Drawing Area */
        #viewer { flex: 1; background: #ffffff; position: relative; display: flex; align-items: center; justify-content: center; touch-action: none; overflow: hidden; }
        
        /* THE VIEWCUBE */
        #cube-container { position: absolute; top: 20px; left: 20px; width: 80px; height: 80px; perspective: 400px; z-index: 100; }
        #viewcube { width: 50px; height: 50px; position: relative; transform-style: preserve-3d; transition: transform 0.5s; transform: rotateX(-20deg) rotateY(-20deg); }
        .cube-face { position: absolute; width: 50px; height: 50px; background: white; border: 2px solid #ff69b4; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; color: #d02090; cursor: pointer; user-select: none; }
        .front  { transform: translateZ(25px); }
        .back   { transform: rotateY(180deg) translateZ(25px); }
        .top    { transform: rotateX(90deg) translateZ(25px); }
        .bottom { transform: rotateX(-90deg) translateZ(25px); }
        .right  { transform: rotateY(90deg) translateZ(25px); }
        .left   { transform: rotateY(-90deg) translateZ(25px); }

        #measurements { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: white; padding: 10px 20px; border-radius: 20px; border: 2px solid #ff69b4; color: #d02090; font-weight: bold; display: flex; gap: 20px; z-index: 50; }

        /* THE STRETCHY SPHERE */
        #sphere-pivot { transform-style: preserve-3d; transition: transform 0.5s; display: flex; align-items: center; justify-content: center; transform: rotateX(-20deg) rotateY(-20deg); }
        #yarn-ball { 
            width: 150px; height: 150px; 
            background: radial-gradient(circle at 35% 35%, #ffb6c1, #ff69b4 60%, #c71585 100%);
            border-radius: 50%; 
            border: 3px solid #d02090;
            cursor: move;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Right Side: The Pattern */
        #panel { width: 360px; background: white; border-left: 2px solid #ffc0cb; padding: 20px; display: flex; flex-direction: column; }
        #gen-btn { background: #ff1493; color: white; border: none; padding: 15px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 18px; box-shadow: 0 4px 0 #b01060; }
        #gen-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b01060; }
        #output { flex: 1; margin-top: 15px; background: #fff9fb; border: 1px solid #ffc0cb; border-radius: 10px; padding: 15px; overflow-y: auto; white-space: pre-wrap; font-family: monospace; font-size: 13px; color: #333; }
    </style>
</head>
<body>

<div id="header">
    <h1>✨ Build-A-Crochet v3.5.28 ✨</h1>
</div>

<div id="main-container">
    <div id="viewer">
        <div id="cube-container">
            <div id="viewcube">
                <div class="cube-face front" onclick="setView(0, 0)">FRONT</div>
                <div class="cube-face back" onclick="snapView(0, 180)">BACK</div>
                <div class="cube-face top" onclick="snapView(90, 0)">TOP</div>
                <div class="cube-face bottom" onclick="snapView(-90, 0)">BOT</div>
                <div class="cube-face right" onclick="snapView(0, 90)">RIGHT</div>
                <div class="cube-face left" onclick="snapView(0, -90)">LEFT</div>
            </div>
        </div>

        <div id="measurements">
            <span>W: <span id="vw">10.0</span>cm</span>
            <span>H: <span id="vh">10.0</span>cm</span>
        </div>

        <div id="sphere-pivot">
            <div id="yarn-ball" onmousedown="startStretch(event)"></div>
        </div>
    </div>

    <div id="panel">
        <button id="gen-btn" onclick="generatePattern()">🧶 MAKE PATTERN</button>
        <div id="output">Grab the ball and pull to stretch it! Click the Cube to spin!</div>
    </div>
</div>
