<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crochet App - Refactored</title>

<style>
body { margin:0; overflow:hidden; font-family:monospace; }
#ui { position:absolute; left:0; top:0; width:80px; height:100vh; background:#eee; display:flex; flex-direction:column; align-items:center; padding-top:20px; }
.btn { width:50px; height:50px; margin:5px; background:#ccc; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.active { background:#4caf50; }
#palette { position:absolute; right:10px; top:10px; display:none; }
.color { width:20px; height:20px; display:inline-block; margin:2px; cursor:pointer; }
</style>
</head>

<body>

<div id="ui">
  <div class="btn" onclick="undo()">U</div>
  <div class="btn" onclick="redo()">R</div>
  <div class="btn" id="spawn" onclick="toggleSpawn()">O</div>
</div>

<div id="palette">
  <div class="color" style="background:#ff69b4" onclick="setColor('#ff69b4')"></div>
  <div class="color" style="background:#000" onclick="setColor('#000')"></div>
  <div class="color" style="background:#fff" onclick="setColor('#fff')"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/* =========================
   CORE STATE
========================= */

let scene, camera, renderer;
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

let eggs = [];
let selected = [];

let dragging = false;
let dragStart = null;

let spawnMode = false;

let undoStack = [];
let redoStack = [];

/* =========================
   INIT
========================= */

init();
animate();

function init(){
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 1000);
    camera.position.set(100,100,100);

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.GridHelper(200, 20));

    scene.add(new THREE.AmbientLight(0xffffff, 1));

    window.addEventListener('pointerdown', onDown);
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
    window.addEventListener('resize', onResize);

    saveState();
}

/* =========================
   EGG
========================= */

function createEgg(){
    const geo = new THREE.SphereGeometry(5, 16, 16);
    const mat = new THREE.MeshStandardMaterial({color:0xff69b4});
    const mesh = new THREE.Mesh(geo, mat);

    mesh.userData.isEgg = true;
    scene.add(mesh);
    eggs.push(mesh);

    return mesh;
}

/* =========================
   INPUT
========================= */

function onDown(e){
    mouse.x = (e.clientX / innerWidth)*2-1;
    mouse.y = -(e.clientY / innerHeight)*2+1;

    raycaster.setFromCamera(mouse, camera);

    const hits = raycaster.intersectObjects(eggs);

    if(hits.length){
        const obj = hits[0].object;

        if(!e.ctrlKey){
            selected = [obj];
        } else {
            if(!selected.includes(obj)) selected.push(obj);
        }

        dragging = true;

        dragStart = hits[0].point.clone();

        document.getElementById("palette").style.display="block";
        return;
    }

    if(spawnMode){
        const plane = new THREE.Plane(new THREE.Vector3(0,1,0),0);
        const p = new THREE.Vector3();
        raycaster.ray.intersectPlane(plane,p);
        createEgg().position.copy(p);
        saveState();
    } else {
        selected = [];
        document.getElementById("palette").style.display="none";
    }
}

function onMove(e){
    if(!dragging || !selected.length) return;

    mouse.x = (e.clientX / innerWidth)*2-1;
    mouse.y = -(e.clientY / innerHeight)*2+1;

    raycaster.setFromCamera(mouse,camera);

    const plane = new THREE.Plane(new THREE.Vector3(0,1,0),0);
    const p = new THREE.Vector3();

    raycaster.ray.intersectPlane(plane,p);

    const delta = p.clone().sub(dragStart);

    selected.forEach(o=>{
        o.position.add(delta);
    });

    dragStart = p.clone();
}

function onUp(){
    if(dragging){
        saveState();
    }
    dragging = false;
}

function onResize(){
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
}

/* =========================
   UI
========================= */

function toggleSpawn(){
    spawnMode = !spawnMode;
    document.getElementById("spawn").classList.toggle("active", spawnMode);
}

function setColor(c){
    selected.forEach(o=>o.material.color.set(c));
    saveState();
}

/* =========================
   UNDO
========================= */

function saveState(){
    const state = eggs.map(e=>({
        x:e.position.x,
        y:e.position.y,
        z:e.position.z,
        c:e.material.color.getHex()
    }));

    undoStack.push(JSON.stringify(state));
    redoStack = [];
}

function restore(stateStr){
    eggs.forEach(e=>scene.remove(e));
    eggs = [];

    const state = JSON.parse(stateStr);

    state.forEach(s=>{
        const e = createEgg();
        e.position.set(s.x,s.y,s.z);
        e.material.color.setHex(s.c);
    });
}

function undo(){
    if(undoStack.length<2) return;
    redoStack.push(undoStack.pop());
    restore(undoStack[undoStack.length-1]);
}

function redo(){
    if(!redoStack.length) return;
    const s = redoStack.pop();
    undoStack.push(s);
    restore(s);
}

/* =========================
   LOOP
========================= */

function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene,camera);
}

</script>

</body>
</html>
