<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet PRO v4.1.1</title>
    <style>
        body { margin: 0; font-family: 'Pretendard', sans-serif; overflow: hidden; background: #222; color: #eee; }
        #ui-panel { position: absolute; top: 20px; left: 20px; width: 280px; background: rgba(40, 40, 40, 0.9); padding: 20px; border-radius: 12px; border: 1px solid #444; z-index: 100; pointer-events: auto; }
        #canvas-container { width: 100vw; height: 100vh; outline: none; }
        .control-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #aaa; margin-bottom: 8px; }
        input[type="range"] { width: 100%; cursor: pointer; }
        #status { font-size: 11px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div id="ui-panel">
    <h2 style="margin:0 0 15px 0; color:#ec4899;">🔬 Lab v4.1.1</h2>
    
    <div class="control-group">
        <label>가로 폭 (Width): <span id="val-w">10.0</span>cm</label>
        <input type="range" id="input-w" min="5" max="30" step="0.5" value="10">
    </div>

    <div class="control-group">
        <label>세로 높이 (Height): <span id="val-h">10.0</span>cm</label>
        <input type="range" id="input-h" min="5" max="30" step="0.5" value="10">
    </div>
    
    <div id="status">> 마우스로 드래그하여 회전하세요. 축이 함께 돕니다.</div>
</div>

<div id="canvas-container"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, sphere;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 30;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 1);
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        // Grid Helper
        const grid = new THREE.GridHelper(50, 50, 0x444444, 0x222222);
        grid.rotation.x = Math.PI / 2;
        scene.add(grid);

        // 1. Axes Helper (회전축 추가: R:X, G:Y, B:Z)
        const axesHelper = new THREE.AxesHelper(15);
        scene.add(axesHelper);

        // 2. The Sphere Geometry (선 밀도 증가: 32x32 -> 64x64)
        const geometry = new THREE.SphereGeometry(1, 64, 64);
        const material = new THREE.MeshPhongMaterial({ 
            color: 0xec4899, 
            wireframe: true,
            transparent: true,
            opacity: 0.6 // 투명도를 낮춰서 내부 축이 보이게
        });
        sphere = new THREE.Mesh(geometry, material);
        scene.add(sphere);

        // Controls
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        window.addEventListener('resize', onWindowResize);
        animate();
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        
        // Update scale based on inputs
        const w = document.getElementById('input-w').value;
        const h = document.getElementById('input-h').value;
        
        // Scale the mesh (X, Y, Z)
        sphere.scale.set(w/2, h/2, w/2);
        
        document.getElementById('val-w').innerText = w;
        document.getElementById('val-h').innerText = h;

        controls.update();
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
