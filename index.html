<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crochet Builder Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to the Crochet Builder!</h1>
        <p>Design your own crochet patterns.</p>
    </header>
    <main>
        <section>
            <h2>Create a New Pattern</h2>
            <form id="patternForm">
                <label for="patternName">Pattern Name:</label>
                <input type="text" id="patternName" name="patternName" required>
                <br>
                <label for="yarnType">Yarn Type:</label>
                <select id="yarnType" name="yarnType">
                    <option value="cotton">Cotton</option>
                    <option value="acrylic">Acrylic</option>
                    <option value="wool">Wool</option>
                </select>
                <br>
                <label for="hookSize">Hook Size:</label>
                <input type="number" id="hookSize" name="hookSize" required>
                <br>
                <label for="instructions">Instructions:</label>
                <textarea id="instructions" name="instructions" required></textarea>
                <br>
                <button type="submit">Create Pattern</button>
            </form>
        </section>
        <section id="patterns">
            <h2>Your Patterns</h2>
            <ul id="patternList"></ul>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Crochet Builder App</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
