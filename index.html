<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Build-A-Crochet PRO v4.3.9</title>
    <style>
        /* v4.3.2의 스타일을 거의 그대로 유지 */
        body { margin: 0; font-family: sans-serif; overflow: hidden; background: #ffffff; color: #333; touch-action: none; }
        #top-bar { 
            position: absolute; top: 0; left: 0; width: 100%; height: 80px;
            background: rgba(255, 255, 255, 0.9); display: flex; align-items: center; 
            justify-content: space-around; padding: 0 10px; box-sizing: border-box;
            border-bottom: 2px solid #ff69b4; z-index: 200;
        }
        .item { display: flex; flex-direction: column; align-items: center; }
        label { font-size: 10px; color: #ff69b4; font-weight: bold; margin-bottom: 2px; }
        select, input { background: #fff; border: 1px solid #ccc; color: #333; border-radius: 4px; padding: 4px; font-size: 12px; }
        
        /* 최소한의 버튼 스타일만 추가 */
        .btn-s { background: #eee; border: 1px solid #ccc; padding: 2px 8px; margin: 0 2px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        
        #canvas-container { width: 100vw; height: 100vh; }
        button#gen-btn { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #ff69b4; color: white; border: none; padding: 15px 30px; 
            border-radius: 30px; font-weight: bold; cursor: pointer; z-index: 150;
        }
        #v-info { position: absolute; bottom: 10px; right: 10px; font-size: 10px; color: #ccc; }
    </style>
</head>
<body>

<div id="top-bar">
    <div class="item">
        <label>YARN</label>
        <select id="yarn-selector">
            <option value="0">0: Lace</option><option value="1">1: Super Fine</option>
            <option value="2">2: Fine</option><option value="3">3: Light</option>
            <option value="4" selected>4: Worsted</option><option value="5">5: Bulky</option>
            <option value="6">6: Super Bulky</option><option value="7">7: Jumbo</option>
        </select>
    </div>
    <div class="item">
        <label>WIDTH(cm)</label>
        <div>
            <button class="btn-s" onclick="document.getElementById('in-w').value=(parseFloat(document.getElementById('in-w').value)-0.5).toFixed(1)">-</button>
            <input type="number" id="in-w" value="13.5" style="width:40px; text-align:center;">
            <button class="btn-s" onclick="document.getElementById('in-w').value=(parseFloat(document.getElementById('in-w').value)+0.5).toFixed(1)">+</button>
        </div>
    </div>
    <div class="item">
        <label>HEIGHT(cm)</label>
        <div>
            <button class="btn-s" onclick="document.getElementById('in-h').value=(parseFloat(document.getElementById('in-h').value)-0.5).toFixed(1)">-</button>
            <input type="number" id="in-h" value="26.0" style="width:40px; text-align:center;">
            <button class="btn-s" onclick="document.getElementById('in-h').value=(parseFloat(document.getElementById('in-h').value)+0.5).toFixed(1)">+</button>
        </div>
    </div>
</div>

<button id="gen-btn" onclick="generatePattern()">GENERATE PATTERN</button>
<div id="v-info">Build-A-Crochet PRO v4.3.9</div>
<div id="canvas-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    // v4.3.2와 동일한 로직 시작
    let scene, camera, renderer, controls, egg;
    const yarnData = { "0":{gh:9,gv:11},"1":{gh:7.5,gv:9},"2":{gh:6.5,gv:7.5},"3":{gh:5.5,gv:6.5},"4":{gh:4.5,gv:5},"5":{gh:3.5,gv:4},"6":{gh:2.5,gv:3},"7":{gh:1.5,gv:1.8} };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(20, 20, 50);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const light = new THREE.PointLight(0xffffff, 1);
        light.position.set(20, 30, 20);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        scene.add(new THREE.GridHelper(100, 20, 0xeeeeee, 0xf5f5f5));
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        animate();
    }

    function createEgg() {
        if(egg) scene.remove(egg);
        const w = parseFloat(document.getElementById('in-w').value) || 10;
        const h = parseFloat(document.getElementById('in-h').value) || 10;
        const points = [];
        for (let i = 0; i <= 20; i++) {
            const t = i / 20;
            const y = (t - 0.5) * h;
            const r = (w / 2) * Math.sqrt(Math.max(0, 1 - Math.pow(y / (h / 2), 2)));
            points.push(new THREE.Vector2(Math.max(0.1, r), y));
        }
        const geometry = new THREE.LatheGeometry(points, 32);
        const material = new THREE.MeshPhongMaterial({ color: 0xff69b4, wireframe: true });
        egg = new THREE.Mesh(geometry, material);
        scene.add(egg);
    }

    function animate() {
        requestAnimationFrame(animate);
        createEgg();
        controls.update();
        renderer.render(scene, camera);
    }

    window.generatePattern = function() {
        const w = document.getElementById('in-w').value;
        const h = document.getElementById('in-h').value;
        const yK = document.getElementById('yarn-selector').value;
        const g = yarnData[yK];
        const rows = Math.round(h * g.gv);
        let log = `<h2>Pattern (${w}x${h}cm)</h2><pre>`;
        let prevSts = 0;
        for(let i=1; i<=rows; i++) {
            let y = ((i/g.gv) - (h/2));
            let r = (w/2) * Math.sqrt(Math.max(0, 1-Math.pow(y/(h/2), 2)));
            let sts = Math.max(6, Math.round(2 * Math.PI * r * g.gh));
            log += `Row ${i}: ${sts} sts (${i>1?sts-prevSts:0})\n`;
            prevSts = sts;
        }
        const win = window.open("", "_blank");
        win.document.write(log + "</pre>");
    }

    window.onload = init;
</script>
</body>
</html>
