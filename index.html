<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build-A-Crochet v3.5.7</title>
    <style>
        /* Base Styles */
        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background: #fff0f5; 
            color: #333; 
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        #header { 
            background: white; 
            padding: 20px; 
            text-align: center; 
            border-bottom: 4px solid #ff69b4; 
        }
        
        #header h1 { margin: 0; color: #d02090; font-size: 28px; }

        #main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Left Side: The "Shape" and Controls */
        #left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fdfdfd;
            border-right: 2px solid #ffc0cb;
            padding: 20px;
        }

        #shape-container {
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        /* The Yarn Sphere */
        #yarn-ball {
            background: #ff69b4;
            border: 5px solid #d02090;
            border-radius: 50%;
            width: 150px;
            height: 150px;
            box-shadow: inset -15px -15px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .stats-bubble {
            background: white;
            padding: 10px 25px;
            border-radius: 30px;
            border: 2px solid #ffc0cb;
            font-weight: bold;
            color: #d02090;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
        }

        /* Right Side: The Pattern */
        #right-panel {
            width: 400px;
            background: white;
            padding: 25px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .control-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            width: 100%;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #ff69b4;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover { background: #ff1493; }
        
        .gen-btn {
            background: #d02090;
            margin-top: 10px;
            font-size: 18px;
            padding: 15px;
        }

        #pattern-box {
            margin-top: 20px;
            padding: 15px;
            background: #fff9fb;
            border: 1px dashed #ffc0cb;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .stuff-note { color: #ff1493; font-weight: bold; background: #ffe4e1; padding: 2px 4px; }
    </style>
</head>
<body>

<div id="header">
    <h1>✨ Build-A-Crochet ✨</h1>
    <div style="font-size: 12px; color: #ff69b4; font-weight: bold;">VERSION 3.5.7</div>
</div>

<div id="main-layout">
    <div id="left-panel">
        <div class="stats-bubble">
            <span>W: <span id="valW">10</span>cm</span>
            <span>H: <span id="valH">10</span>cm</span>
            <span>L: <span id="valL">10</span>cm</span>
        </div>

        <div id="shape-container">
            <div id="yarn-ball"></div>
        </div>

        <div style="width: 100%; max-width: 300px;">
            <p style="text-align:center; font-weight:bold; color:#666;">Adjust Size:</p>
            <div class="control-row">
                <button onclick="changeSize('w', 1)">+ Width</button>
                <button onclick="changeSize('w', -1)">- Width</button>
            </div>
            <div class="control-row">
                <button onclick="changeSize('h', 1)">+ Height</button>
                <button onclick="changeSize('h', -1)">- Height</button>
