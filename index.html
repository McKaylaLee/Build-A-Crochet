<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Build-A-Crochet PRO v4.3.2 | 3D Restoration</title>
    <style>
        body { margin: 0; font-family: sans-serif; overflow: hidden; background: #111; color: #fff; touch-action: none; }
        
        /* Minimalist Top Control Bar */
        #top-bar { 
            position: absolute; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(20, 20, 20, 0.9); display: flex; align-items: center; 
            justify-content: space-around; padding: 0 10px; box-sizing: border-box;
            border-bottom: 2px solid #ff69b4; z-index: 200;
        }
        
        .item { display: flex; flex-direction: column; align-items: center; }
        label { font-size: 10px; color: #ff69b4; font-weight: bold; margin-bottom: 2px; }
        select, input { background: #222; border: 1px solid #444; color: #fff; border-radius: 4px; padding: 4px; font-size: 12px; }
        
        #canvas-container { width: 100vw; height: 100vh; }
        
        button#gen-btn { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #ff69b4; color: white; border: none; padding: 15px 30px; 
            border-radius: 30px; font-weight: bold; cursor: pointer; z-index: 150;
            box-shadow: 0 5px 20px rgba(255, 105, 180, 0.4);
        }
        
        #error-msg { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ff4444; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px;
            display: none; text-align: center; z-index: 300;
        }
    </style>
</head>
<body>

<div id="error-msg">
    <b>3D Engine Load Failed.</b><br>
    Please check your internet connection or browser security settings.
</div>

<div id="top-bar">
    <div class="item">
        <label>YARN</label>
        <select id="yarn-selector">
            <option value="0">0: Lace</option>
            <option value="4" selected>4: Worsted</option>
            <option value="7">7: Jumbo</option>
        </select>
    </div>
    <div class="item">
        <label>WIDTH(cm)</label>
        <input type="number" id="in-w" value="13.5">
    </div>
    <div class="item">
        <label>HEIGHT(cm)</label>
        <input type="number" id="in-h" value="26.0">
    </div>
</div>

<button id="gen-btn" onclick="generatePattern()">GENERATE PATTERN</button>

<div id="canvas-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, egg;

    const yarnData = {
        "0": { gh: 9.0, gv: 11.0 },
        "4": { gh: 4.5, gv: 5.0 },
        "7": { gh: 1.5, gv: 1.8 }
    };

    function init() {
        try {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(20, 20, 50);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Lighting
            const light = new THREE.PointLight(0xffffff, 1);
            light.position.set(20, 30, 20);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));

            // Grid & Axes
            scene.add(new THREE.GridHelper(100, 20, 0x333333, 0x222222));
            scene.add(new THREE.AxesHelper(10));

            // Egg Mesh (Lathe for perfect egg shape)
            createEgg();

            // Controls (Mouse & Touch support)
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            window.addEventListener('resize', onWindowResize);
            animate();
        } catch (e) {
            console.error(e);
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    function createEgg() {
        if(egg) scene.remove(egg);
        
        const w = parseFloat(document.getElementById('in-w').value) || 10;
        const h = parseFloat(document.getElementById('in-h').value) || 10;
        
        const points = [];
        for (let i = 0; i <= 20; i++) {
            const t = i / 20;
            const y = (t - 0.5) * h;
            const r = (w / 2) * Math.sqrt(1 - Math.pow(y / (h / 2), 2));
            points.push(new THREE.Vector2(Math.max(0.1, r), y));
        }

        const geometry = new THREE.LatheGeometry(points, 32);
        const material = new THREE.MeshPhongMaterial({ color: 0xff69b4, wireframe: true });
        egg = new THREE.Mesh(geometry, material);
        scene.add(egg);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        createEgg(); // 실시간 수치 반영
        controls.update();
        renderer.render(scene, camera);
    }

    window.generatePattern = function() {
        const w = parseFloat(document.getElementById('in-w').value);
        const h = parseFloat(document.getElementById('in-h').value);
        const yK = document.getElementById('yarn-selector').value;
        const g = yarnData[yK];
        const totalRows = Math.round(h * g.gv);
        
        let log = `<h2>Pattern Log (${w}x${h}cm)</h2><pre style="font-family:monospace;">`;
        for(let i=1; i<=totalRows; i++) {
            let y = ((i/g.gv) - (h/2));
            let r = (w/2) * Math.sqrt(Math.max(0, 1 - Math.pow(y/(h/2), 2)));
            let sts = Math.max(6, Math.round(2 * Math.PI * r * g.gh));
            log += `Row ${i}: ${sts} sts\n`;
        }
        
        const win = window.open("", "_blank");
        win.document.write(log + "</pre>");
    }

    // 엔진 로드 대기 후 실행
    window.onload = init;
</script>
</body>
</html>
