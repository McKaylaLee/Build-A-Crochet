<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Build-A-Crochet PRO v4.2.1 | Mobile Touch</title>
    <style>
        body { margin: 0; font-family: sans-serif; overflow: hidden; background: #1a1a1a; color: #fff; touch-action: none; }
        
        /* Mobile Friendly UI */
        #ui-panel { 
            position: absolute; top: 10px; left: 10px; width: 220px; 
            background: rgba(30, 30, 30, 0.9); padding: 15px; border-radius: 10px; 
            border: 1px solid #ff69b4; z-index: 100; font-size: 13px;
        }
        
        #pattern-panel { 
            position: absolute; bottom: 10px; right: 10px; width: 250px; height: 35%; 
            background: rgba(30, 30, 30, 0.9); padding: 15px; border-radius: 10px; 
            border: 1px solid #444; z-index: 100; display: flex; flex-direction: column;
        }
        
        .control-group { margin-bottom: 10px; }
        label { display: block; font-size: 10px; color: #ff69b4; margin-bottom: 3px; font-weight: bold; }
        select, input { width: 100%; padding: 8px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; }
        
        #canvas-container { width: 100vw; height: 100vh; }
        
        button { background: #ff69b4; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        
        #output-log { flex: 1; background: #000; border-radius: 5px; padding: 10px; margin-top: 10px; overflow-y: auto; font-family: monospace; font-size: 11px; color: #0f0; }

        /* Hide UI for better view on small screens */
        @media (max-width: 600px) {
            #ui-panel { width: 160px; font-size: 11px; }
            #pattern-panel { width: 180px; }
        }
    </style>
</head>
<body>

<div id="ui-panel">
    <label>Yarn Size</label>
    <select id="yarn-selector">
        <option value="0">0: Lace</option>
        <option value="4" selected>4: Worsted</option>
        <option value="6">6: Super Bulky</option>
    </select>

    <div class="control-group" style="margin-top:10px;">
        <label>W (cm)</label>
        <input type="number" id="in-w" value="13.5">
    </div>
    <div class="control-group">
        <label>H (cm)</label>
        <input type="number" id="in-h" value="26.0">
    </div>

    <button onclick="runSlicingEngine()">CONVERT</button>
</div>

<div id="pattern-panel">
    <div id="output-log">Pattern will appear here...</div>
</div>

<div id="canvas-container"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, object;
    const yarnData = { "0": { gh: 9.0, gv: 11.0 }, "4": { gh: 4.5, gv: 5.0 }, "6": { gh: 2.5, gv: 3.0 } };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 50);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // For sharp mobile display
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const axes = new THREE.AxesHelper(10);
        scene.add(axes);

        const geometry = new THREE.SphereGeometry(1, 32, 32);
        const material = new THREE.MeshPhongMaterial({ color: 0xff69b4, wireframe: true });
        object = new THREE.Mesh(geometry, material);
        scene.add(object);

        // OrbitControls handles touch automatically if configured
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN }; // Mobile optimization

        window.addEventListener('resize', onWindowResize);
        animate();
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const w = parseFloat(document.getElementById('in-w').value) || 10;
        const h = parseFloat(document.getElementById('in-h').value) || 10;
        object.scale.set(w/2, h/2, w/2);
        controls.update();
        renderer.render(scene, camera);
    }

    window.runSlicingEngine = function() {
        const w = parseFloat(document.getElementById('in-w').value);
        const h = parseFloat(document.getElementById('in-h').value);
        const y = document.getElementById('yarn-selector').value;
        const g = yarnData[y];
        
        let rows = Math.round(h * g.gv);
        let log = `[MOBILE REPORT]\nSize: ${w}x${h}cm\nRows: ${rows}\n\n`;

        for (let i = 1; i <= rows; i++) {
            let normalizedY = ((i / g.gv) - (h / 2)) / (h / 2);
            let radius = (w / 2) * Math.sqrt(Math.max(0, 1 - Math.pow(normalizedY, 2)));
            let sts = Math.max(6, Math.round(2 * Math.PI * radius * g.gh));
            log += `R${i}: ${sts} sts\n`;
        }
        document.getElementById('output-log').innerText = log;
    }

    init();
</script>
</body>
</html>
